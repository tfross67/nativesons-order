<body>
  <header class="site-header">
    <div class="container header-inner">
      <div class="brand">
        <img src="logo.jpg" alt="Native Sons Wholesale Nursery" class="brand-logo" height="56">
      </div>
      <div class="header-meta">
        <span class="header-tagline">We grow plants that thrive in California's Mediterranean climate.</span>
        <span class="week-label" id="weekLabel">This week</span>
      </div>
    </div>
  </header>

  <main class="chat-test-root">
    <div class="hero-band">
      <div class="hero-content">
        <div class="hero-eyebrow">This week's availability</div>
        <h2 class="hero-headline" id="heroHeadline">50+ plants in bloom</h2>
        <p class="hero-sub">Browse by color, size, water needs, or just describe what you're looking for.</p>
      </div>
      <div class="hero-stats" id="heroStats"></div>
    </div>

    <div class="search-shell">
      <div class="search-input-row">
        <input type="search" id="chatSearch" class="search-input"
               placeholder='e.g. "red flowers in 1gal" or "drought tolerant ceanothus"'
               autocomplete="off" aria-label="Search plants with natural language">
        <button type="button" id="chatClear" class="clear-btn">Clear</button>
      </div>
      <div class="suggested">
        <span class="suggested-label">Try:</span>
        <button class="suggestion" data-q="red flowers 1gal">red flowers 1gal</button>
        <button class="suggestion" data-q="drought tolerant">drought tolerant</button>
        <button class="suggestion" data-q="white bloom 5gal">white bloom 5gal</button>
        <button class="suggestion" data-q="full sun natives">full sun natives</button>
        <button class="suggestion" data-q="shade fern">shade fern</button>
        <button class="suggestion" data-q="aromatic">aromatic</button>
        <button class="suggestion" data-q="15gal tree">15gal tree</button>
        <button class="suggestion" data-q="yellow flower">yellow flower</button>
      </div>
    </div>

    <div id="filterSummary" class="filter-summary" hidden></div>
    <div id="results" class="results"></div>
    <div id="noResults" class="no-results" hidden>No plants match your search. Try fewer words or different terms.</div>

    <div id="selectionBar" class="selection-bar" hidden>
      <div class="selection-summary">
        <strong id="selCount">0</strong> selected ·
        <span id="selTotal"></span>
      </div>
      <div class="selection-actions">
        <button type="button" class="action-btn" id="selSelectAll">Select all visible</button>
        <button type="button" class="action-btn" id="selExportCsv">Export CSV</button>
        <button type="button" class="action-btn" id="selExportText">Copy as text</button>
        <button type="button" class="action-btn primary" id="selEmail">Email list</button>
        <button type="button" class="action-btn" id="selPrint">Print</button>
        <button type="button" class="action-btn danger" id="selClear">Clear</button>
      </div>
    </div>
  </main>

  <script src="availability_data.js"></script>
  <script>
  /* ========================================================================
   * Native Sons — Smart Plant Search (chat-test.html)
   *
   * Loads availability_data.js (existing catalog), parses the user's natural-
   * language query into structured filters, and renders matching plants as
   * cards. No LLM, no API calls — pure client-side keyword + synonym matching.
   * ====================================================================== */

  (function () {
    const $ = (id) => document.getElementById(id);
    const input = $('chatSearch');
    const clearBtn = $('chatClear');
    const resultsEl = $('results');
    const noResultsEl = $('noResults');
    const filterSummaryEl = $('filterSummary');
    const weekLabel = $('weekLabel');
    const selectionBar = $('selectionBar');
    const selCount = $('selCount');
    const selTotal = $('selTotal');

    // === Selection state (persisted to localStorage) ===
    const SEL_KEY = 'ns_chat_selection_v1';
    let selection = loadSelection();

    function loadSelection() {
      try {
        const raw = localStorage.getItem(SEL_KEY);
        return raw ? JSON.parse(raw) : {};
      } catch (e) { return {}; }
    }
    function saveSelection() {
      try { localStorage.setItem(SEL_KEY, JSON.stringify(selection)); } catch (e) {}
    }
    function isSelected(botanical) { return !!selection[botanical]; }
    function toggleSelection(botanical, plant) {
      if (selection[botanical]) {
        delete selection[botanical];
      } else {
        selection[botanical] = plant;
      }
      saveSelection();
      renderSelectionBar();
    }
    function clearSelection() {
      selection = {};
      saveSelection();
      renderSelectionBar();
      // Refresh any visible checkboxes
      document.querySelectorAll('.result-checkbox').forEach(c => {
        c.classList.remove('checked');
        c.textContent = '';
      });
      document.querySelectorAll('.result.selected').forEach(c => c.classList.remove('selected'));
    }
    function selectAllVisible() {
      document.querySelectorAll('.result[data-botanical]').forEach(card => {
        const b = card.dataset.botanical;
        if (!selection[b]) {
          // Find the plant object from the catalog
          const plant = getCatalog().find(p => p.botanical === b);
          if (plant) selection[b] = plant;
        }
      });
      saveSelection();
      renderSelectionBar();
      // Update visible checkboxes
      document.querySelectorAll('.result[data-botanical]').forEach(card => {
        card.classList.add('selected');
        const cb = card.querySelector('.result-checkbox');
        if (cb) { cb.classList.add('checked'); cb.textContent = '✓'; }
      });
    }
    function getSelectedPlants() {
      return Object.values(selection);
    }
    function renderSelectionBar() {
      const plants = getSelectedPlants();
      const n = plants.length;
      selCount.textContent = String(n);
      if (n === 0) {
        selectionBar.hidden = true;
        selTotal.textContent = '';
        return;
      }
      selectionBar.hidden = false;
      // Compute min wholesale total (sum of lowest available size's price per plant)
      const total = plants.reduce((sum, p) => {
        const prices = (p.sizes || []).map(s => Number(s.price || 0)).filter(x => x > 0);
        return sum + (prices.length ? Math.min(...prices) : 0);
      }, 0);
      selTotal.textContent = total > 0 ? `wholesale from $${total.toFixed(2)}` : '';
    }
    // Init bar on load (in case there are saved selections)
    renderSelectionBar();

    // === Load the catalog (already provided via <script src="availability_data.js">) ===
    function getCatalog() {
      const av = window.AVAILABILITY && window.AVAILABILITY.plants || [];
      // Show week label if available
      if (window.AVAILABILITY && window.AVAILABILITY.week && weekLabel) {
        weekLabel.textContent = window.AVAILABILITY.week;
      }
      // Populate hero band with real numbers from the catalog
      renderHero(av);
      return av;
    }

    // === Hero band renderer ===
    // Shows live counts: total plants, in bloom, CA natives.
    function renderHero(plants) {
      const headline = $('heroHeadline');
      const stats = $('heroStats');
      if (!plants || !plants.length || !headline || !stats) return;
      const inBloom = plants.filter(p => p.bloom).length;
      const natives = plants.filter(p => isNativeOrigin(p.origin)).length;
      const total = plants.length;
      headline.textContent = `${inBloom} plants in bloom this week`;
      stats.innerHTML =
        `<div class="hero-stat"><div class="hero-stat-num">${total}</div><div class="hero-stat-label">total</div></div>` +
        `<div class="hero-stat"><div class="hero-stat-num">${inBloom}</div><div class="hero-stat-label">in bloom</div></div>` +
        `<div class="hero-stat"><div class="hero-stat-num">${natives}</div><div class="hero-stat-label">CA native</div></div>`;
    }

    // === Synonyms / canonicalisation maps ===
    // Maps user-friendly terms to canonical keys and values used in the catalog.
    const COLOR_SYNONYMS = {
      red:    ['red', 'scarlet', 'crimson', 'burgundy', 'rose', 'magenta', 'pink-red'],
      pink:   ['pink', 'rose-pink', 'blush'],
      white:  ['white', 'cream', 'ivory', 'pale'],
      yellow: ['yellow', 'gold', 'golden'],
      blue:   ['blue', 'sky blue', 'powder blue', 'cobalt'],
      purple: ['purple', 'violet', 'lavender', 'lilac'],
      orange: ['orange', 'tangerine', 'apricot'],
      green:  ['green', 'chartreuse'],
    };
    const EXPOSURE_SYNONYMS = {
      'full sun':       ['full sun', 'sun', 'sunny'],
      'partial shade':  ['partial shade', 'part shade', 'part sun', 'half shade'],
      'shade':          ['shade', 'shaded', 'full shade'],
    };
    const WATER_SYNONYMS = {
      low:    ['drought tolerant', 'drought', 'low water', 'xeric', 'dry'],
      moderate:['moderate water', 'regular water', 'medium water'],
      high:   ['high water', 'moist', 'wet'],
    };
    const TYPE_SYNONYMS = {
      shrub:    ['shrub', 'bush', 'bushes'],
      grass:    ['grass', 'grasses', 'sedge', 'sedges', 'ornamental grass'],
      fern:     ['fern', 'ferns'],
      palm:     ['palm', 'palms'],
      succulent:['succulent', 'agave', 'yucca'],
      perennial:['perennial', 'perennials', 'flower'],
      tree:     ['tree', 'trees'],
    };

    // === Parse query into structured filters ===
    /*
     * Returns { filters: {field: value[]}, matchedPlants: [...], score: fn(p) }
     * The filter is applied; scoring decides rank.
     */
    function parseQuery(rawQuery) {
      const q = (rawQuery || '').toLowerCase().trim();
      const filters = {
        colors:    [],   // list of canonical color keys
        exposures: [],   // list of canonical exposure keys
        water:     [],   // list of canonical water keys
        types:     [],   // list of canonical plant type keys
        container: [],   // ['1gal','5gal','15gal','4in','2gal','7gal','20inch']
        inBloom:   false,
        budding:   false,
        origin:    [],   // ['California','Oregon', etc.]
        freeText:  [],   // tokens to match anywhere
      };

      if (!q) return { filters, freeText: [], active: false };

      // Container: "1gal", "5gal", "15gal", "4in", "4 inch", "2gal", "7gal", "20 inch box"
      const containerMatches = q.match(/(\d+\s*(?:gal|inch|in|inch box)\w*)/g);
      if (containerMatches) {
        containerMatches.forEach(c => {
          const norm = c.replace(/\s+/g, '').replace(/inch/g, 'in');
          if (!filters.container.includes(norm)) filters.container.push(norm);
        });
      }

      // In bloom / budding
      if (/\b(?:bloom|blooming|in bloom|in flower|flowering)\b/.test(q)) filters.inBloom = true;
      if (/\b(?:bud|budding)\b/.test(q)) filters.budding = true;

      // Colors
      for (const [canon, synonyms] of Object.entries(COLOR_SYNONYMS)) {
        if (synonyms.some(s => q.includes(s))) filters.colors.push(canon);
      }
      // Exposures
      for (const [canon, synonyms] of Object.entries(EXPOSURE_SYNONYMS)) {
        if (synonyms.some(s => q.includes(s))) filters.exposures.push(canon);
      }
      // Water
      for (const [canon, synonyms] of Object.entries(WATER_SYNONYMS)) {
        if (synonyms.some(s => q.includes(s))) filters.water.push(canon);
      }
      // Plant types
      for (const [canon, synonyms] of Object.entries(TYPE_SYNONYMS)) {
        if (synonyms.some(s => q.includes(s))) filters.types.push(canon);
      }

      // Origin keywords
      if (/\bnative|california\b/.test(q)) filters.origin.push('California', 'California, Oregon', 'California to Washington', 'California to Alaska and Montana', 'Baja California to Oregon', 'Coastal California', 'Coastal Central California', 'Coastal Southern California', 'California (Channel Islands)', 'Western British Columbia to Southern California', 'British Columbia to California', 'Southern Oregon', 'Southern Oregon to San Luis Obispo County, California', 'San Miguel and Santa Cruz Islands', 'Cedros Island, Baja California');
      if (/\boregon\b/.test(q)) filters.origin.push('Oregon', 'California, Oregon', 'Southern Oregon');

      // Free-text tokens: anything left after we strip the structured terms
      const stopwords = new Set([
        'a','an','the','for','with','in','on','at','of','to','and','or','is','are','show','me','what','any','have','do','you','got','find','i','want','need','plant','plants','flower','flowers','color','size','price','priced',
      ]);
      const allKnown = [
        ...Object.values(COLOR_SYNONYMS).flat(),
        ...Object.values(EXPOSURE_SYNONYMS).flat(),
        ...Object.values(WATER_SYNONYMS).flat(),
        ...Object.values(TYPE_SYNONYMS).flat(),
        'gal','inch','under','over','less','more','than','below','above','max','min','native','natives','california','oregon','red','white','bloom','blooming','budding','in','at','$',
      ];
      const tokens = q.split(/[^a-z0-9]+/).filter(Boolean);
      filters.freeText = tokens.filter(t =>
        !stopwords.has(t) &&
        !allKnown.some(k => k.replace(/\s+/g, '').includes(t)) &&
        t.length > 1
      );

      // Decide if this is "active" (any structured or free-text signal)
      const active = filters.colors.length || filters.exposures.length || filters.water.length ||
                     filters.types.length || filters.container.length ||
                     filters.inBloom || filters.budding ||
                     filters.origin.length || filters.freeText.length;

      return { filters, freeText: filters.freeText, active };
    }

    // === Match a plant against parsed filters ===
    function matchPlant(plant, parsed) {
      const { filters, freeText } = parsed;
      const matchedFields = new Set();
      const matchedColors = [];
      const matchedExposures = [];
      const matchedWater = [];
      const matchedTypes = [];
      const matchedContainer = [];
      const matchedBloom = [];

      const fieldContains = (val, target) =>
        String(val || '').toLowerCase().includes(target.toLowerCase());

      // === Colors ===
      if (filters.colors.length) {
        const fc = (plant.flower_color || '').toLowerCase();
        for (const c of filters.colors) {
          if (fc.includes(c)) {
            matchedColors.push(c);
            matchedFields.add('flower_color');
          }
        }
        if (!matchedColors.length) return null;
      }

      // === Exposure ===
      if (filters.exposures.length) {
        const exp = (plant.exposure || '').toLowerCase();
        for (const e of filters.exposures) {
          if (exp.includes(e)) {
            matchedExposures.push(e);
            matchedFields.add('exposure');
          }
        }
        if (!matchedExposures.length) return null;
      }

      // === Water ===
      if (filters.water.length) {
        const w = (plant.water || '').toLowerCase();
        for (const ww of filters.water) {
          if (w.includes(ww) || (ww === 'low' && w.includes('low')) || (ww === 'moderate' && w.includes('moderate')) || (ww === 'high' && (w.includes('high') || w.includes('moist')))) {
            matchedWater.push(ww);
            matchedFields.add('water');
          }
        }
        if (!matchedWater.length) return null;
      }

      // === Plant type ===
      if (filters.types.length) {
        const pt = (plant.plant_type || '').toLowerCase();
        const bot = (plant.botanical || '').toLowerCase();
        const matchedType = filters.types.some(t => {
          if (t === 'grass' && (pt.includes('grass') || pt.includes('sedge') || pt.includes('rush'))) return true;
          if (t === 'fern'  && (pt.includes('fern') || /fern/.test(bot))) return true;
          if (t === 'palm'  && (pt.includes('palm') || /palm/.test(bot))) return true;
          if (t === 'succulent' && (pt.includes('succulent') || /agave|yucca|sedum|dudleya/.test(bot))) return true;
          if (t === 'shrub' && pt.includes('shrub')) return true;
          if (t === 'tree' && pt.includes('tree')) return true;
          if (t === 'perennial' && pt.includes('perennial')) return true;
          return false;
        });
        if (!matchedType) return null;
        matchedTypes.push(...filters.types);
        matchedFields.add('plant_type');
      }

      // === Container / size ===
      let matchedSomeContainer = false;
      if (filters.container.length) {
        const sizes = plant.sizes || [];
        for (const c of filters.container) {
          const hit = sizes.some(s => {
            const sc = String(s.container || '').toLowerCase().replace(/\s+/g, '');
            return sc === c || sc.includes(c);
          });
          if (hit) {
            matchedContainer.push(c);
            matchedSomeContainer = true;
          }
        }
        if (!matchedSomeContainer) return null;
        matchedFields.add('container');
      }

      // === Bloom / Budding ===
      if (filters.inBloom && !plant.bloom) return null;
      if (filters.inBloom) matchedBloom.push('in bloom');
      if (filters.budding && !plant.bud) return null;
      if (filters.budding) matchedBloom.push('budding');

      // === Origin ===
      if (filters.origin.length) {
        const o = (plant.origin || '').toLowerCase();
        if (!filters.origin.some(x => o.includes(x.toLowerCase()))) return null;
      }

      // === Free-text token matching ===
      const allText = [
        plant.botanical, plant.common, plant.section, plant.flower_color,
        plant.flower_time, plant.foliage, plant.plant_type, plant.exposure,
        plant.height, plant.width, plant.origin, plant.water,
      ].filter(Boolean).join(' ').toLowerCase();
      const matchedFreeText = [];
      for (const tok of freeText) {
        if (allText.includes(tok)) matchedFreeText.push(tok);
      }
      // If we have free-text tokens but no structured filters, require at least one match
      const hasStructured = filters.colors.length || filters.exposures.length ||
                            filters.water.length || filters.types.length ||
                            filters.container.length ||
                            filters.inBloom || filters.budding ||
                            filters.origin.length;
      if (!hasStructured && freeText.length && !matchedFreeText.length) return null;

      // === Score ===
      let score = 0;
      score += matchedColors.length * 4;
      score += matchedExposures.length * 2;
      score += matchedWater.length * 3;
      score += matchedTypes.length * 2;
      score += matchedContainer.length * 2;
      score += matchedFreeText.length;
      score += (plant.bloom ? 1 : 0);

      return {
        score,
        matched: {
          colors: matchedColors, exposures: matchedExposures, water: matchedWater,
          types: matchedTypes, container: matchedContainer,
          bloom: matchedBloom, freeText: matchedFreeText,
        }
      };
    }

    // === Render ===
    function escapeHTML(s) {
      return String(s == null ? '' : s).replace(/[&<>"']/g, c => ({
        '&': '&amp;', '<': '&lt;', '>': '&gt;', '"': '&quot;', "'": '&#39;'
      }[c]));
    }

    function fmtSize(s) {
      const c = s.container || '?';
      const p = Number(s.price || 0);
      return p ? `${c} $${p.toFixed(2)}` : c;
    }

    // Build nativeson.com product URL from botanical name.
    // Slug format: lowercase, dashes for spaces, no punctuation, no cultivar quotes.
    // Most matches Drupal's auto-path generation. A few edge cases may 404 — those
    // are the nursery's own URL slugs we'll need to override manually if they matter.
    function plantUrl(botanical) {
      if (!botanical) return 'https://www.nativeson.com';
      const slug = String(botanical)
        .toLowerCase()
        .replace(/[®™©]/g, '')         // strip registered marks
        .replace(/[''‛`]/g, '')        // strip smart/straight quotes around cultivar
        .replace(/[^\w\s-]/g, '')      // drop remaining punctuation
        .replace(/\s+/g, '-')          // spaces -> dashes
        .replace(/-+/g, '-')           // collapse multiple dashes
        .replace(/^-|-$/g, '');        // trim leading/trailing dashes
      return `https://www.nativeson.com/product/${slug}`;
    }

    // Is the plant's origin in our CA/Western-US native range?
    function isNativeOrigin(origin) {
      if (!origin) return false;
      const o = origin.toLowerCase();
      return /california|baja|oregon|washington|alaska|montana|arizona|new mexico|channel islands|british columbia|pacific northwest/.test(o);
    }

    function pill(text, isMatch = false, category = '') {
      // text may already contain <span class="match-hl">...</span> from highlight().
      // If it does, trust it (highlight already escaped safely). Otherwise escape.
      const isHtml = /<[a-z][^>]*>/i.test(text);
      const inner = isHtml ? text : escapeHTML(text);
      const cls = `meta-pill${isMatch ? ' match' : ''}${category ? ' cat-' + category : ''}`;
      return `<span class="${cls}">${inner}</span>`;
    }

    // === No-match suggestions ===
    // When the query returns zero results, suggest similar queries that DO have results.
    // Strategy: try stripping one filter at a time (color, water, type, container, etc.)
    // and run again. Pick the smallest set of suggestions that returned > 0 results.
    function suggestAlternatives(catalog, parsed) {
      const candidates = [];
      const f = parsed.filters;

      // Build candidate queries by selectively dropping each filter
      const drops = [
        { name: 'colors',    q: (orig) => dropColors(orig) },
        { name: 'exposures', q: (orig) => dropExposures(orig) },
        { name: 'water',     q: (orig) => dropWater(orig) },
        { name: 'types',     q: (orig) => dropTypes(orig) },
        { name: 'container', q: (orig) => dropContainer(orig) },
        { name: 'origin',    q: (orig) => dropOrigin(orig) },
        { name: 'bloom',     q: (orig) => dropBloom(orig) },
        { name: 'freeText',  q: (orig) => dropFreeText(orig) },
      ];

      // Helper to count results for a candidate query
      const countFor = (candidateParsed) => {
        let n = 0;
        for (const plant of catalog) {
          if (matchPlant(plant, candidateParsed)) n++;
          if (n > 0) break; // we only need > 0 for ranking
        }
        return n;
      };

      for (const drop of drops) {
        const newParsed = drop.q(parsed);
        if (!newParsed) continue;
        const count = countFor(newParsed);
        if (count > 0) {
          const label = describeParsed(newParsed);
          candidates.push({ label, parsed: newParsed, count });
        }
      }

      // De-dupe by label, sort by count desc, take top 4
      const seen = new Set();
      const unique = [];
      candidates.sort((a, b) => b.count - a.count);
      for (const c of candidates) {
        if (seen.has(c.label)) continue;
        seen.add(c.label);
        unique.push(c);
        if (unique.length >= 4) break;
      }
      return unique;
    }

    function dropColors(p) {
      if (!p.filters.colors.length) return null;
      const f = { ...p.filters, colors: [] };
      const freeText = [...p.freeText, ...p.filters.colors];
      return { filters: f, freeText, active: true };
    }
    function dropExposures(p) {
      if (!p.filters.exposures.length) return null;
      const f = { ...p.filters, exposures: [] };
      const freeText = [...p.freeText, ...p.filters.exposures];
      return { filters: f, freeText, active: true };
    }
    function dropWater(p) {
      if (!p.filters.water.length) return null;
      const f = { ...p.filters, water: [] };
      const freeText = [...p.freeText, ...p.filters.water];
      return { filters: f, freeText, active: true };
    }
    function dropTypes(p) {
      if (!p.filters.types.length) return null;
      const f = { ...p.filters, types: [] };
      const freeText = [...p.freeText, ...p.filters.types];
      return { filters: f, freeText, active: true };
    }
    function dropContainer(p) {
      if (!p.filters.container.length) return null;
      const f = { ...p.filters, container: [] };
      const freeText = [...p.freeText, ...p.filters.container];
      return { filters: f, freeText, active: true };
    }
    function dropOrigin(p) {
      if (!p.filters.origin.length) return null;
      const f = { ...p.filters, origin: [] };
      return { filters: f, freeText: p.freeText, active: true };
    }
    function dropBloom(p) {
      if (!p.filters.inBloom && !p.filters.budding) return null;
      const f = { ...p.filters, inBloom: false, budding: false };
      return { filters: f, freeText: p.freeText, active: true };
    }
    function dropFreeText(p) {
      if (!p.freeText.length) return null;
      return { filters: { ...p.filters }, freeText: [], active: true };
    }

    // Build a readable description of a parsed query (for suggestion chips)
    function describeParsed(p) {
      const f = p.filters;
      const parts = [];
      if (f.colors.length)    parts.push(f.colors.join(' '));
      if (f.types.length)     parts.push(f.types.join(' '));
      if (f.water.length)     parts.push(WATER_SYNONYMS[f.water[0]]?.[0] || f.water[0]);
      if (f.exposures.length) parts.push(EXPOSURE_SYNONYMS[f.exposures[0]]?.[0] || f.exposures[0]);
      if (f.container.length) parts.push(f.container.join(' '));
      if (f.inBloom)          parts.push('in bloom');
      if (f.budding)          parts.push('budding');
      if (f.origin.length)    parts.push('native');
      if (p.freeText.length)  parts.push(p.freeText.join(' '));
      return parts.join(' ') || 'all plants';
    }

    // === Highlight matched terms in a string ===
    function highlight(text, terms) {
      if (!text) return '';
      if (!terms || !terms.length) return escapeHTML(text);
      // Escape first, then wrap matches
      let out = escapeHTML(text);
      const seen = new Set();
      for (const raw of terms) {
        const t = String(raw).toLowerCase().trim();
        if (!t || t.length < 2 || seen.has(t)) continue;
        seen.add(t);
        // Match the term anywhere — case-insensitive
        const re = new RegExp('(' + t.replace(/[.*+?^${}()|[\]\\]/g, '\\$&') + ')', 'gi');
        out = out.replace(re, '<span class="match-hl">$1</span>');
      }
      return out;
    }

    function renderResults(parsed, results) {
      resultsEl.innerHTML = '';
      noResultsEl.hidden = results.length > 0;

      // === Filter summary ===
      const f = parsed.filters;
      const summary = [];
      if (f.colors.length)    summary.push(`Color: ${f.colors.join(', ')}`);
      if (f.exposures.length) summary.push(`Exposure: ${f.exposures.join(', ')}`);
      if (f.water.length)     summary.push(`Water: ${f.water.join(', ')}`);
      if (f.types.length)     summary.push(`Type: ${f.types.join(', ')}`);
      if (f.container.length) summary.push(`Size: ${f.container.join(', ')}`);
      if (f.inBloom)          summary.push('In bloom');
      if (f.budding)          summary.push('Budding');
      if (f.origin.length)    summary.push('Native/CA');
      if (f.freeText.length)  summary.push(`"${f.freeText.join(' ')}"`);
      filterSummaryEl.hidden = summary.length === 0;
      if (summary.length) {
        filterSummaryEl.innerHTML =
          `<strong>${results.length}</strong> result${results.length === 1 ? '' : 's'} — ` +
          summary.map(s => `<span class="pill">${escapeHTML(s)}</span>`).join('');
      }

      // === No-match suggestions ===
      if (results.length === 0 && parsed.active) {
        const alts = suggestAlternatives(getCatalog(), parsed);
        const altChips = alts.map(a =>
          `<button class="suggestion" data-alt='${escapeHTML(JSON.stringify(a.parsed))}'>${escapeHTML(a.label)} <small style="color:#9a8c7a">(${a.count})</small></button>`
        ).join('');
        noResultsEl.innerHTML = `
          <h3>No plants match <em>"${escapeHTML(input.value)}"</em></h3>
          <p>${alts.length ? 'Try one of these instead:' : 'Try different words or fewer filters.'}</p>
          <div class="suggestions">${altChips}</div>
        `;
        // Wire up the suggestion chips (they emit a custom event the main listener handles)
        noResultsEl.querySelectorAll('[data-alt]').forEach(btn => {
          btn.addEventListener('click', () => {
            const altParsed = JSON.parse(btn.dataset.alt);
            // Reconstruct the input value from the parsed query
            const reconstructed = describeParsed(altParsed);
            input.value = reconstructed;
            // Save the parsed result so run() can skip parsing
            lastParsed = altParsed;
            run(true);
          });
        });
      }

      // === Highlight terms (color + free-text tokens) ===
      const highlightTerms = [...(parsed.filters.colors||[]), ...(parsed.freeText||[])];

      // === Cards ===
      results.forEach(({ plant, match }) => {
        const card = document.createElement('article');
        card.className = 'result';
        const sizes = plant.sizes || [];

        const matched = match.matched;
        const matchReasons = [];
        if (matched.colors.length) matchReasons.push(`color: ${matched.colors.join(', ')}`);
        if (matched.exposures.length) matchReasons.push(`exposure: ${matched.exposures.join(', ')}`);
        if (matched.water.length) matchReasons.push(`water: ${matched.water.join(', ')}`);
        if (matched.types.length) matchReasons.push(`type: ${matched.types.join(', ')}`);
        if (matched.container.length) matchReasons.push(`size: ${matched.container.join(', ')}`);
        if (matched.bloom.length) matchReasons.push(matched.bloom.join(', '));
        if (matched.freeText.length) matchReasons.push(`text: ${matched.freeText.join(', ')}`);

        // === Prominent type + origin line (immediately after common name) ===
        // If both exist, render inline as "Type · Origin" so they sit together.
        const typeSpan = plant.plant_type
          ? `<span class="result-type${matched.types.length > 0 ? ' match' : ''}">${highlight(plant.plant_type, highlightTerms)}</span>`
          : '';
        const originSpan = plant.origin
          ? `<span class="result-origin${isNativeOrigin(plant.origin) ? ' native' : ''}">${isNativeOrigin(plant.origin) ? '<span class="ca-badge">CA</span>' : ''}${highlight(plant.origin, highlightTerms)}</span>`
          : '';
        const sep = (typeSpan && originSpan) ? '<span class="sep">·</span>' : '';
        const typeOriginHTML = (typeSpan || originSpan)
          ? `<div class="result-type-origin">${typeSpan}${sep}${originSpan}</div>`
          : '';

                // Build meta pills (color, exposure, water, height, width — type/origin are above)
                let meta = [];
                if (plant.bloom) meta.push(pill('🌸 in bloom', matched.bloom.includes('in bloom'), 'bloom'));
                else if (plant.bud) meta.push(pill('🌿 budding', matched.bloom.includes('budding'), 'bloom'));
                if (plant.flower_color) {
                  const fcFirst = String(plant.flower_color).toLowerCase().split(/[ ,\(]/)[0];
                  const isColorMatch = matched.colors.some(c => plant.flower_color.toLowerCase().includes(c));
                  meta.push(pill(highlight(plant.flower_color, highlightTerms), isColorMatch, 'flower'));
                }
                if (plant.exposure) {
                  const isExpMatch = matched.exposures.some(e => plant.exposure.toLowerCase().includes(e));
                  meta.push(pill(highlight(plant.exposure, highlightTerms), isExpMatch, 'exposure'));
                }
                if (plant.water) {
                  meta.push(pill(highlight(plant.water, highlightTerms), matched.water.length > 0, 'water'));
                }
                if (plant.height) meta.push(pill(plant.height, false, 'size'));
                if (plant.width)  meta.push(pill(plant.width, false, 'size'));

                const sizesHTML = sizes.length
                  ? sizes.map(s => `${escapeHTML(fmtSize(s))}`).join(', ')
                  : '—';

                const matchLine = matchReasons.length
                  ? `<div class="result-match-line">matched on: ${matchReasons.map(r => escapeHTML(r)).join(' · ')}</div>`
                  : '';

                const isSel = isSelected(plant.botanical);

                card.innerHTML = `
                  <a class="result-link" href="${plantUrl(plant.botanical)}" target="_blank" rel="noopener" aria-label="More info on ${escapeHTML(plant.botanical)} on nativeson.com"></a>
                  <div class="result-checkbox${isSel ? ' checked' : ''}" role="checkbox" aria-checked="${isSel}" aria-label="Select ${escapeHTML(plant.botanical)}" data-select>${isSel ? '✓' : ''}</div>
                  <div class="result-botanical">${highlight(plant.botanical, highlightTerms)}</div>
                  <div class="result-common">${highlight(plant.common || '', highlightTerms)}</div>
                  ${typeOriginHTML}
                  <div class="result-meta">${meta.join('')}</div>
                  <div class="result-price">${escapeHTML(sizesHTML)}</div>
                  ${matchLine}
                  <div class="result-footer">
                    <span class="result-link-text">More info on nativeson.com →</span>
                  </div>
                `;
        card.dataset.botanical = plant.botanical;
        if (isSel) card.classList.add('selected');
        resultsEl.appendChild(card);
      });
    }

    // === Main: parse + match + render ===
    let lastParsed = null;  // reused when alt-suggestion chip is clicked

    function run(useExisting) {
      const q = input.value;
      const catalog = getCatalog();
      const parsed = useExisting && lastParsed ? lastParsed : parseQuery(q);
      lastParsed = parsed;

      if (!parsed.active) {
        resultsEl.innerHTML = '';
        noResultsEl.hidden = true;
        filterSummaryEl.hidden = true;
        return;
      }

      const results = [];
      for (const plant of catalog) {
        const match = matchPlant(plant, parsed);
        if (match) results.push({ plant, match });
      }
      results.sort((a, b) => b.match.score - a.match.score);
      renderResults(parsed, results);
    }

    // === Wire up ===
    let typingTimer = null;
    input.addEventListener('input', () => {
      clearTimeout(typingTimer);
      typingTimer = setTimeout(run, 120);
    });
    clearBtn.addEventListener('click', () => {
      input.value = '';
      resultsEl.innerHTML = '';
      noResultsEl.hidden = true;
      filterSummaryEl.hidden = true;
      input.focus();
    });
    document.querySelectorAll('.suggestion').forEach(btn => {
      btn.addEventListener('click', () => {
        input.value = btn.dataset.q;
        run();
        input.focus();
      });
    });
    input.addEventListener('keydown', (e) => {
      if (e.key === 'Enter') { e.preventDefault(); run(); }
    });
    input.focus();

    // Populate the week label on initial load (it was only being set inside
    // getCatalog(), which is invoked by run() — i.e. only after a search).
    getCatalog();

    // Pre-fill the input and run a default search so the page has tiles on first load.
    input.value = 'in bloom';
    run();

    // === Selection: click checkbox or card area to toggle ===
    // Use event delegation on results container. Checkbox click is captured first
    // (z-index 3 > link overlay z-index 1), so it doesn't trigger the link.
    resultsEl.addEventListener('click', (e) => {
      const cb = e.target.closest('[data-select]');
      if (!cb) return;
      e.preventDefault();
      e.stopPropagation();
      const card = cb.closest('.result');
      if (!card) return;
      const botanical = card.dataset.botanical;
      const plant = getCatalog().find(p => p.botanical === botanical);
      if (!plant) return;
      toggleSelection(botanical, plant);
      // Update this card's UI
      const nowSelected = isSelected(botanical);
      cb.classList.toggle('checked', nowSelected);
      cb.textContent = nowSelected ? '✓' : '';
      cb.setAttribute('aria-checked', String(nowSelected));
      card.classList.toggle('selected', nowSelected);
    });

    // === Export functions ===
    function buildCsv(plants) {
      const rows = [['Botanical', 'Common name', 'Origin', 'Available sizes & prices', 'URL']];
      for (const p of plants) {
        const sizes = (p.sizes || []).map(s => {
          const c = s.container || '';
          const pr = Number(s.price || 0);
          return pr ? `${c} $${pr.toFixed(2)}` : c;
        }).join('; ');
        rows.push([
          p.botanical || '',
          p.common || '',
          p.origin || '',
          sizes,
          plantUrl(p.botanical),
        ]);
      }
      return rows.map(row => row.map(cell => {
        const s = String(cell == null ? '' : cell);
        return /[",\n]/.test(s) ? `"${s.replace(/"/g, '""')}"` : s;
      }).join(',')).join('\n');
    }

    function buildTextList(plants) {
      return plants.map(p => {
        const sizes = (p.sizes || []).map(s => {
          const c = s.container || '';
          const pr = Number(s.price || 0);
          return pr ? `${c} $${pr.toFixed(2)}` : c;
        }).join(', ');
        const origin = p.origin ? ` (${p.origin})` : '';
        return `${p.botanical} — ${p.common || ''}${origin}\n   ${sizes}\n   ${plantUrl(p.botanical)}`;
      }).join('\n\n');
    }

    function downloadFile(filename, content, mime) {
      const blob = new Blob([content], { type: mime });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = filename;
      document.body.appendChild(a);
      a.click();
      document.body.removeChild(a);
      setTimeout(() => URL.revokeObjectURL(url), 100);
    }

    function copyToClipboard(text) {
      // Fallback path: use execCommand if clipboard API blocked
      if (navigator.clipboard && navigator.clipboard.writeText) {
        return navigator.clipboard.writeText(text);
      }
      return new Promise((resolve, reject) => {
        const ta = document.createElement('textarea');
        ta.value = text;
        ta.style.position = 'fixed';
        ta.style.opacity = '0';
        document.body.appendChild(ta);
        ta.select();
        try {
          document.execCommand('copy');
          document.body.removeChild(ta);
          resolve();
        } catch (e) {
          document.body.removeChild(ta);
          reject(e);
        }
      });
    }

    function flashButton(btn, label, ms) {
      const orig = btn.textContent;
      btn.textContent = label;
      btn.disabled = true;
      setTimeout(() => {
        btn.textContent = orig;
        btn.disabled = false;
      }, ms || 1200);
    }

    // === Wire up selection-bar buttons ===
    $('selExportCsv').addEventListener('click', () => {
      const plants = getSelectedPlants();
      if (!plants.length) return;
      const csv = buildCsv(plants);
      const stamp = new Date().toISOString().slice(0, 10);
      downloadFile(`native-sons-selection-${stamp}.csv`, csv, 'text/csv');
      flashButton($('selExportCsv'), 'Downloaded ✓');
    });

    $('selExportText').addEventListener('click', async () => {
      const plants = getSelectedPlants();
      if (!plants.length) return;
      const text = buildTextList(plants);
      try {
        await copyToClipboard(text);
        flashButton($('selExportText'), 'Copied ✓');
      } catch (e) {
        flashButton($('selExportText'), 'Copy failed');
      }
    });

    $('selEmail').addEventListener('click', () => {
      const plants = getSelectedPlants();
      if (!plants.length) return;
      const text = buildTextList(plants);
      const subject = `Plant availability inquiry — ${plants.length} item${plants.length === 1 ? '' : 's'}`;
      const body = `Hi Native Sons,\n\nI'd like to inquire about the following ${plants.length} plant${plants.length === 1 ? '' : 's'}:\n\n${text}\n\nThanks,\n`;
      const mailto = `mailto:orders@nativeson.com?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      window.location.href = mailto;
    });

    $('selPrint').addEventListener('click', () => {
      const plants = getSelectedPlants();
      if (!plants.length) return;
      const w = window.open('', '_blank', 'width=900,height=700');
      if (!w) { alert('Pop-up blocked — allow pop-ups to print.'); return; }
      const rowsHtml = plants.map(p => {
        const sizes = (p.sizes || []).map(s => {
          const c = s.container || '';
          const pr = Number(s.price || 0);
          return pr ? `${c} $${pr.toFixed(2)}` : c;
        }).join(', ');
        return `<tr>
          <td><em>${escapeHTML(p.botanical)}</em></td>
          <td>${escapeHTML(p.common || '')}</td>
          <td>${escapeHTML(p.origin || '')}</td>
          <td>${escapeHTML(sizes)}</td>
          <td><a href="${plantUrl(p.botanical)}">${escapeHTML(plantUrl(p.botanical))}</a></td>
        </tr>`;
      }).join('');
      const total = plants.reduce((sum, p) => {
        const prices = (p.sizes || []).map(s => Number(s.price || 0)).filter(x => x > 0);
        return sum + (prices.length ? Math.min(...prices) : 0);
      }, 0);
      w.document.write(`<!DOCTYPE html><html><head><title>Native Sons selection</title>
<style>
  body{font-family:Helvetica,Arial,sans-serif;margin:24px;color:#2d4a2b;}
  h1{font-family:Georgia,serif;font-weight:normal;margin:0 0 4px;}
  table{width:100%;border-collapse:collapse;margin-top:12px;}
  th,td{text-align:left;padding:8px 10px;border-bottom:1px solid #d4cfbe;font-size:13px;vertical-align:top;}
  th{background:#f4f1ea;font-size:11px;text-transform:uppercase;letter-spacing:.5px;}
  .total{margin-top:16px;font-size:14px;}
  @media print { a { color: inherit; text-decoration: none; } }
</style></head><body>
<h1>Native Sons — Plant Selection</h1>
<p>${plants.length} plant${plants.length === 1 ? '' : 's'} · printed ${new Date().toLocaleDateString()}</p>
<table>
  <thead><tr><th>Botanical</th><th>Common</th><th>Origin</th><th>Sizes / Prices</th><th>Link</th></tr></thead>
  <tbody>${rowsHtml}</tbody>
</table>
<p class="total">Wholesale total (lowest size per plant): <strong>$${total.toFixed(2)}</strong></p>
<p style="font-size:11px;color:#666;margin-top:24px;">379 W El Campo Rd · Arroyo Grande, CA 93420 · 805.481.5996 · orders@nativeson.com</p>
</body></html>`);
      w.document.close();
      w.focus();
      setTimeout(() => { try { w.print(); } catch (e) {} }, 250);
    });

    $('selSelectAll').addEventListener('click', selectAllVisible);

    $('selClear').addEventListener('click', () => {
      if (getSelectedPlants().length === 0) return;
      if (!confirm('Clear all selections?')) return;
      clearSelection();
    });

    // Diagnostic — useful if you're testing
    window.chatTestRun = run;
    window.chatTestParse = parseQuery;
    window.chatTestSelection = () => Object.values(selection);
    console.log('chat-test.html ready. Try: chatTestParse("red flowers 1gal")');
  })();
  </script>
</body>
