<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
  <meta name="theme-color" content="#2d4a2b">
  <title>Admin — Native Sons Orders</title>
  <link rel="stylesheet" href="styles.css">
  <style>
    .admin-wrap { max-width: 1100px; margin: 24px auto 80px; padding: 0 20px; }
    .admin-header { display: flex; justify-content: space-between; align-items: center; flex-wrap: wrap; gap: 12px; margin-bottom: 20px; }
    .admin-header h1 { font-family: var(--font-serif); color: var(--c-sage-deep); margin: 0; font-size: 28px; }

    .toolbar {
      display: flex; gap: 8px; flex-wrap: wrap; align-items: center;
      background: var(--c-paper); border: 1px solid var(--c-line); border-radius: var(--r-lg);
      padding: 12px; margin-bottom: 16px; box-shadow: var(--c-shadow);
    }
    .toolbar input, .toolbar select {
      border: 1px solid var(--c-line); border-radius: var(--r-md);
      padding: 8px 10px; font-size: 14px; font-family: inherit;
      background: var(--c-paper); color: var(--c-ink); outline: none;
    }
    .toolbar input:focus, .toolbar select:focus { border-color: var(--c-sage); }
    .toolbar input { flex: 1; min-width: 200px; }
    .stats { display: flex; gap: 8px; margin-left: auto; font-size: 13px; color: var(--c-ink-soft); }
    .stats strong { color: var(--c-sage-deep); }

    .orders-table {
      width: 100%; border-collapse: collapse; background: var(--c-paper);
      border: 1px solid var(--c-line); border-radius: var(--r-lg); overflow: hidden;
      box-shadow: var(--c-shadow);
    }
    .orders-table th, .orders-table td { padding: 12px 14px; text-align: left; font-size: 14px; }
    .orders-table th { background: var(--c-bg-soft); font-weight: 600; color: var(--c-sage-deep); font-size: 12px; text-transform: uppercase; letter-spacing: 0.05em; }
    .orders-table tr { border-top: 1px solid var(--c-line); }
    .orders-table tr:hover { background: var(--c-bg); cursor: pointer; }
    .orders-table td.num { font-variant-numeric: tabular-nums; text-align: right; }

    .status-pill {
      display: inline-block; padding: 3px 10px; border-radius: 999px; font-size: 11px;
      font-weight: 600; text-transform: uppercase; letter-spacing: 0.05em;
    }
    .status-new { background: var(--c-clay-soft); color: var(--c-clay); }
    .status-confirmed { background: var(--c-bud-soft); color: #8a6618; }
    .status-fulfilled { background: var(--c-sage-soft); color: var(--c-sage-deep); }
    .status-cancelled { background: #eee; color: #888; }

    .order-detail {
      background: var(--c-paper); border: 1px solid var(--c-line); border-radius: var(--r-lg);
      padding: 24px; margin-top: 20px; box-shadow: var(--c-shadow);
    }
    .order-detail h2 { font-family: var(--font-serif); color: var(--c-sage-deep); margin: 0 0 8px; }
    .detail-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 16px; margin: 16px 0; }
    .detail-grid dt { font-size: 12px; color: var(--c-muted); text-transform: uppercase; letter-spacing: 0.05em; }
    .detail-grid dd { margin: 0 0 12px; font-size: 15px; color: var(--c-ink); }
    .line-items { width: 100%; border-collapse: collapse; margin-top: 12px; }
    .line-items th, .line-items td { padding: 8px 10px; font-size: 14px; text-align: left; border-bottom: 1px solid var(--c-line); }
    .line-items th { font-size: 11px; text-transform: uppercase; color: var(--c-muted); font-weight: 600; }
    .line-items td.num { text-align: right; font-variant-numeric: tabular-nums; }
    .line-items th.num { text-align: right; }
    .line-items .retail { color: var(--c-muted); }
    .line-items tfoot td { border-top: 2px solid var(--c-line); border-bottom: none; font-weight: 600; padding-top: 12px; }
    .line-items tfoot td.num { font-variant-numeric: tabular-nums; }

    .login-card {
      max-width: 360px; margin: 80px auto; padding: 32px;
      background: var(--c-paper); border: 1px solid var(--c-line);
      border-radius: var(--r-lg); box-shadow: var(--c-shadow);
    }
    .login-card h1 { font-family: var(--font-serif); color: var(--c-sage-deep); margin: 0 0 8px; font-size: 24px; }
    .login-card p { color: var(--c-ink-soft); font-size: 14px; margin: 0 0 16px; }

    @media (max-width: 700px) {
      .detail-grid { grid-template-columns: 1fr; }
      .orders-table { font-size: 12px; }
      .orders-table th, .orders-table td { padding: 8px; }
    }
  </style>
</head>
<body>
  <div id="loginView" class="login-card">
    <h1>Admin login</h1>
    <p>Enter the admin password to view orders.</p>
    <form id="loginForm">
      <label class="form-field">
        <span>Password</span>
        <input type="password" id="passwordInput" required autocomplete="current-password">
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
    </form>
  </div>

  <div id="adminView" class="admin-wrap" hidden>
    <div class="admin-header">
      <h1>Orders</h1>
      <div>
        <button class="btn btn-ghost" id="refreshBtn">↻ Refresh</button>
        <button class="btn btn-ghost" id="exportBtn">⤓ Export CSV</button>
        <button class="btn btn-ghost" id="logoutBtn">Sign out</button>
      </div>
    </div>

    <div class="toolbar">
      <input type="search" id="searchInput" placeholder="Search by order #, name, email, item…">
      <select id="statusFilter">
        <option value="active" selected>Active (hide cancelled)</option>
        <option value="all">All statuses</option>
        <option value="new">New</option>
        <option value="confirmed">Confirmed</option>
        <option value="fulfilled">Fulfilled</option>
        <option value="cancelled">Cancelled</option>
      </select>
      <div class="stats" id="stats"></div>
    </div>

    <table class="orders-table" id="ordersTable">
      <thead>
        <tr>
          <th>Order #</th>
          <th>Date</th>
          <th>Customer</th>
          <th>Items</th>
          <th class="num">Subtotal</th>
          <th>Status</th>
        </tr>
      </thead>
      <tbody id="ordersBody">
        <tr><td colspan="6" style="text-align:center; padding: 24px; color: var(--c-muted);">Loading…</td></tr>
      </tbody>
    </table>

    <div id="orderDetail" class="order-detail" hidden></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script>
    // ============================================================
    // Admin dashboard. Uses the service role key to bypass RLS.
    // The service role key is embedded in admin.html only (not in
    // the public-facing index.html). The anon key still gates the
    // login form below as a basic first-line check.
    const SERVICE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6InJ1d3lmZXNibG1hdXJmdWlhb2Z3Iiwicm9sZSI6InNlcnZpY2Vfcm9sZSIsImlhdCI6MTc4MzAzNjI2OSwiZXhwIjoyMDk4NjEyMjY5fQ.MU0lqySTPZ0AHpdthOgyZfYJyj_2vF0cj-TyHWw8Pxs';

    // Password the user types — checked client-side. Set this in
    // admin-config.js (kept separate from the service key for hygiene).
    // The service role key is what actually controls DB access.
    let ADMIN_PASSWORD = 'change-me-in-admin-config-js';  // <-- set a real password in admin-config.js (overrides this default)

    const cfg = window.SUPABASE_CONFIG || {};
    const supabaseAdmin = (cfg.url && SERVICE_KEY !== 'YOUR_SUPABASE_SERVICE_ROLE_KEY_HERE')
      ? window.supabase.createClient(cfg.url, SERVICE_KEY)
      : null;

    const $ = (id) => document.getElementById(id);
    const loginView = $('loginView');
    const adminView = $('adminView');
    const loginForm = $('loginForm');
    const passwordInput = $('passwordInput');
    const ordersBody = $('ordersBody');
    const searchInput = $('searchInput');
    const statusFilter = $('statusFilter');
    const statsEl = $('stats');
    const refreshBtn = $('refreshBtn');
    const exportBtn = $('exportBtn');
    const logoutBtn = $('logoutBtn');
    const orderDetail = $('orderDetail');

    // Try to load admin-config.js for separate password file
    const cfgScript = document.createElement('script');
    cfgScript.src = 'admin-config.js';
    cfgScript.onload = () => {
      if (window.ADMIN_CONFIG && window.ADMIN_CONFIG.password) {
        // Replace the const above
        eval(`ADMIN_PASSWORD = ${JSON.stringify(window.ADMIN_CONFIG.password)}`);
      }
    };
    cfgScript.onerror = () => { /* file is optional */ };
    document.head.appendChild(cfgScript);

    let allOrders = [];

    // ----- Auth -----
    loginForm.addEventListener('submit', (e) => {
      e.preventDefault();
      if (passwordInput.value === ADMIN_PASSWORD) {
        sessionStorage.setItem('nativesons_admin', '1');
        showAdmin();
      } else {
        alert('Wrong password.');
        passwordInput.value = '';
        passwordInput.focus();
      }
    });

    logoutBtn.addEventListener('click', () => {
      sessionStorage.removeItem('nativesons_admin');
      showLogin();
    });

    function showLogin() {
      loginView.hidden = false;
      adminView.hidden = true;
      passwordInput.focus();
    }
    function showAdmin() {
      loginView.hidden = true;
      adminView.hidden = false;
      loadOrders();
    }

    if (sessionStorage.getItem('nativesons_admin') === '1') showAdmin();
    else showLogin();

    // ----- Data load -----
    async function loadOrders() {
      if (!supabaseAdmin) {
        ordersBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:24px; color:var(--c-clay);">
          Supabase service role key not configured. Edit admin.html and paste the service role key, then set a password in admin-config.js.
        </td></tr>`;
        return;
      }

      ordersBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:24px; color:var(--c-muted);">Loading…</td></tr>`;

      const { data, error } = await supabaseAdmin
        .from('orders')
        .select('*')
        .order('created_at', { ascending: false });

      if (error) {
        ordersBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:24px; color:var(--c-clay);">
          Error: ${error.message}
        </td></tr>`;
        return;
      }

      allOrders = data || [];
      renderOrders();
    }

    // ----- Render -----
    function esc(s) { return String(s == null ? '' : s).replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;').replace(/"/g, '&quot;').replace(/'/g, '&#39;'); }
    const fmt = (n) => (typeof n === 'number' ? n.toFixed(2) : '0.00');
    const fmtDate = (iso) => {
      if (!iso) return '—';
      const d = new Date(iso);
      return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric' }) + ' ' + d.toLocaleTimeString('en-US', { hour: 'numeric', minute: '2-digit' });
    };

    function renderOrders() {
      const q = searchInput.value.trim().toLowerCase();
      const status = statusFilter.value;
      const filtered = allOrders.filter(o => {
        if (status === 'active') {
          // Hide cancelled orders (the common case while testing).
          if (o.status === 'cancelled') return false;
        } else if (status !== 'all' && o.status !== status) {
          return false;
        }
        if (!q) return true;
        return [o.order_number, o.customer_name, o.customer_email, o.customer_company]
          .filter(Boolean).join(' ').toLowerCase().includes(q);
      });

      const newCount = allOrders.filter(o => o.status === 'new').length;
      const totalSubtotal = allOrders.reduce((s, o) => s + (o.subtotal || 0), 0);
      statsEl.innerHTML = `<strong>${newCount}</strong> new · <strong>${allOrders.length}</strong> total · <strong>$${fmt(totalSubtotal)}</strong> value`;

      if (filtered.length === 0) {
        ordersBody.innerHTML = `<tr><td colspan="6" style="text-align:center; padding:24px; color:var(--c-muted);">No orders match.</td></tr>`;
        return;
      }

      ordersBody.innerHTML = filtered.map(o => `
        <tr data-id="${o.id}">
          <td><code>${esc(o.order_number)}</code></td>
          <td>${fmtDate(o.created_at)}</td>
          <td>${esc(o.customer_name)}${o.customer_company ? `<br><small style="color:var(--c-muted)">${esc(o.customer_company)}</small>` : ''}</td>
          <td>${o.item_count || 0}</td>
          <td class="num">$${fmt(o.subtotal)}</td>
          <td><span class="status-pill status-${esc(o.status)}">${esc(o.status)}</span></td>
        </tr>
      `).join('');

      ordersBody.querySelectorAll('tr[data-id]').forEach(tr => {
        tr.addEventListener('click', () => showOrderDetail(tr.dataset.id));
      });
    }

    async function showOrderDetail(id) {
      const o = allOrders.find(x => x.id === id);
      if (!o) return;
      orderDetail.hidden = false;

      const { data: items, error } = await supabaseAdmin
        .from('order_items')
        .select('*')
        .eq('order_id', id);

      if (error) {
        orderDetail.innerHTML = `<p style="color:var(--c-clay)">Error loading items: ${error.message}</p>`;
        return;
      }

      const lineRows = (items || []).map(i => `
        <tr>
          <td>${esc(i.plant_name)}</td>
          <td>${esc(i.plant_size || '—')}</td>
          <td class="num">${i.qty}</td>
          <td class="num">$${fmt(i.unit_price)}</td>
          <td class="num">$${fmt(i.line_total)}</td>
          <td class="num retail">${i.retail_unit_price != null ? `$${fmt(i.retail_unit_price)}` : '—'}</td>
          <td class="num retail">${i.retail_line_total != null ? `$${fmt(i.retail_line_total)}` : '—'}</td>
        </tr>
      `).join('');

      const totalQty = (items || []).reduce((s, i) => s + (i.qty || 0), 0);
      const totalWholesale = (items || []).reduce((s, i) => s + Number(i.line_total || 0), 0);
      const totalRetail = (items || []).reduce((s, i) => s + Number(i.retail_line_total || 0), 0);
      const hasRetail = (items || []).some(i => i.retail_unit_price != null);

      const totalsRow = hasRetail ? `
        <tfoot><tr>
          <td><strong>Totals</strong></td>
          <td></td>
          <td class="num">${totalQty}</td>
          <td></td>
          <td class="num">$${fmt(totalWholesale)}</td>
          <td></td>
          <td class="num">$${fmt(totalRetail)}</td>
        </tr></tfoot>` : '';

      orderDetail.innerHTML = `
        <h2>${esc(o.order_number)}</h2>
        <p>Placed ${fmtDate(o.created_at)} · <span class="status-pill status-${esc(o.status)}">${esc(o.status)}</span></p>
        <dl class="detail-grid">
          <div>
            <dt>Name</dt><dd>${esc(o.customer_name)}</dd>
            <dt>Email</dt><dd><a href="mailto:${esc(o.customer_email)}">${esc(o.customer_email)}</a></dd>
          </div>
          <div>
            <dt>Phone</dt><dd>${o.customer_phone ? `<a href="tel:${esc(o.customer_phone)}">${esc(o.customer_phone)}</a>` : '—'}</dd>
            <dt>Company</dt><dd>${esc(o.customer_company || '—')}</dd>
          </div>
        </dl>
        ${o.notes ? `<p><strong>Notes:</strong> ${esc(o.notes)}</p>` : ''}
        <table class="line-items">
          <thead><tr><th>Plant</th><th>Size</th><th class="num">Qty</th><th class="num">Wholesale</th><th class="num">Whsl $</th><th class="num">Retail</th><th class="num">Retail $</th></tr></thead>
          <tbody>${lineRows}</tbody>
          ${totalsRow}
        </table>
        <div style="display:flex; gap:8px; margin-top:16px; flex-wrap:wrap;">
          ${o.status === 'new' ? `<button class="btn btn-primary" data-set-status="confirmed">Mark confirmed</button>` : ''}
          ${o.status !== 'fulfilled' && o.status !== 'cancelled' ? `<button class="btn btn-primary" data-set-status="fulfilled">Mark fulfilled</button>` : ''}
          ${o.status !== 'cancelled' ? `<button class="btn btn-ghost" data-set-status="cancelled">Cancel order</button>` : ''}
          <button class="btn btn-ghost" data-action="copy-csv">Copy CSV</button>
          <button class="btn btn-ghost" data-action="download-csv">Download CSV</button>
          <button class="btn btn-ghost" data-action="email-office">Email office</button>
          <a class="btn btn-ghost" href="mailto:${esc(o.customer_email)}?subject=Re: Order ${encodeURIComponent(o.order_number)}">Email customer</a>
        </div>
      `;

      orderDetail.querySelectorAll('[data-set-status]').forEach(btn => {
        btn.addEventListener('click', async () => {
          const newStatus = btn.dataset.setStatus;
          const { error } = await supabaseAdmin
            .from('orders')
            .update({ status: newStatus, updated_at: new Date().toISOString() })
            .eq('id', id);
          if (error) {
            alert('Update failed: ' + error.message);
          } else {
            await loadOrders();
            const updated = allOrders.find(x => x.id === id);
            if (updated) showOrderDetail(id);
          }
        });
      });

      // ----- CSV builder (single-table layout, normal column widths) -----
      function buildOrderCsv() {
        const o = allOrders.find(x => x.id === id);
        const lines = [];

        function csvEscape(v) {
          if (v == null) v = '';
          v = String(v).replace(/"/g, '""');
          return `"${v}"`;
        }

        const totalQty = (items || []).reduce((s, i) => s + (i.qty || 0), 0);
        const totalWhsl = (items || []).reduce((s, i) => s + Number(i.line_total || 0), 0);
        const totalRetl = (items || []).reduce((s, i) => s + Number(i.retail_line_total || 0), 0);
        const orderDate = o.created_at ? new Date(o.created_at) : null;
        const dateStr = orderDate ? orderDate.toLocaleDateString('en-US', { month: 'short', day: 'numeric', year: 'numeric' }) : '';

        // ----- Top: order summary -----
        // Columns: Order | Date | Status | Customer | Email | Phone | Company | Qty | Plants | Wholesale | Retail | Notes
        // Qty (total units) and Plants (line count) sit between contact info and totals so the
        // office can scan "how much" without hunting.
        const metaHeaders = [
          'Order', 'Date', 'Status', 'Customer', 'Email', 'Phone', 'Company',
          'Qty', 'Plants', 'Wholesale', 'Retail', 'Notes'
        ];
        const metaRow = [
          o.order_number, dateStr, o.status, o.customer_name, o.customer_email,
          o.customer_phone || '', o.customer_company || '',
          totalQty, (items || []).length,
          `$${totalWhsl.toFixed(2)}`, `$${totalRetl.toFixed(2)}`,
          (o.notes || '').replace(/\n/g, ' ')
        ];
        lines.push(metaHeaders.map(csvEscape).join(','));
        lines.push(metaRow.map(csvEscape).join(','));

        // ----- Detail rows: Plant | Qty | Size | W Unit | W Line | R Unit -----
        // Numeric columns (W Unit, W Line, R Unit) are formatted as "$8.00" so the
        // dollar sign travels with the value (no spreadsheet dependency needed) and
        // are quoted so the value travels intact when the file is opened in
        // Excel/Numbers/Sheets — those apps will still auto-format the cell as
        // currency on import thanks to the leading "$".
        lines.push('');
        const itemHeaders = ['Plant', 'Qty', 'Size', 'W Unit', 'W Line', 'R Unit'];
        lines.push(itemHeaders.map(csvEscape).join(','));

        const hasRetail = (items || []).some(i => i.retail_unit_price != null);
        for (const i of (items || [])) {
          const wsUnit = i.unit_price != null ? `$${Number(i.unit_price).toFixed(2)}` : '';
          const wsLine = `$${Number(i.line_total || 0).toFixed(2)}`;
          const rtUnit = hasRetail && i.retail_unit_price != null
            ? `$${Number(i.retail_unit_price).toFixed(2)}` : '';
          lines.push([
            i.plant_name, i.qty, i.plant_size || '',
            wsUnit, wsLine, rtUnit,
          ].map(csvEscape).join(','));
        }

        // Totals footer: TOTAL | Qty | Size blank | $W Total | $W Total | $R Total
        // Wholesale total fills both W Unit and W Line columns (echo) — this keeps the
        // footer cleanly readable. R Unit column gets the retail total.
        lines.push([
          'TOTAL', totalQty, '',
          `$${totalWhsl.toFixed(2)}`,
          `$${totalWhsl.toFixed(2)}`,
          hasRetail ? `$${totalRetl.toFixed(2)}` : '',
        ].map(csvEscape).join(','));

        return lines.join('\n');
      }

      async function flashCopied(text) {
        try {
          await navigator.clipboard.writeText(text);
          const banner = document.createElement('div');
          banner.textContent = '✓ Copied to clipboard';
          Object.assign(banner.style, {
            position: 'fixed', left: '16px', right: '16px', bottom: '16px',
            padding: '12px 16px', borderRadius: '8px',
            background: '#e6f4d9', border: '1px solid #7aa84a',
            font: '14px -apple-system, sans-serif', zIndex: '9999',
            textAlign: 'center', fontWeight: '600'
          });
          document.body.appendChild(banner);
          setTimeout(() => banner.remove(), 1800);
        } catch (e) {
          alert('Copy failed: ' + e.message + ' — try Download CSV instead.');
        }
      }

      orderDetail.querySelector('[data-action="copy-csv"]')?.addEventListener('click', () => {
        flashCopied(buildOrderCsv());
      });
      orderDetail.querySelector('[data-action="download-csv"]')?.addEventListener('click', () => {
        const o = allOrders.find(x => x.id === id);
        const csv = buildOrderCsv();
        const blob = new Blob([csv], { type: 'text/csv' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = `${o.order_number}.csv`;
        a.click();
        URL.revokeObjectURL(url);
      });
      orderDetail.querySelector('[data-action="email-office"]')?.addEventListener('click', () => {
        const o = allOrders.find(x => x.id === id);
        const subject = `Order ${o.order_number} — ${o.customer_name}`;
        const body = `Attached is the order detail for ${o.order_number}.\n\n` +
          `Order #:\t${o.order_number}\n` +
          `Customer:\t${o.customer_name}\n` +
          `Email:\t${o.customer_email}\n` +
          `Phone:\t${o.customer_phone || ''}\n` +
          `Company:\t${o.customer_company || ''}\n` +
          `Status:\t${o.status}\n` +
          `Plants:\t${(items || []).length}\n` +
          `Units:\t${(items || []).reduce((s, i) => s + (i.qty || 0), 0)}\n` +
          `Wholesale:\t$${(items || []).reduce((s, i) => s + Number(i.line_total || 0), 0).toFixed(2)}\n` +
          `Retail:\t$${(items || []).reduce((s, i) => s + Number(i.retail_line_total || 0), 0).toFixed(2)}\n\n` +
          `To attach the CSV, click "Copy CSV" or "Download CSV" above and paste/attach.\n`;
        // Open mailto with a pre-filled body. Office inbox from window.PORTAL_CONFIG or fall back to orders@nativeson.com.
        const officeEmail = (window.PORTAL_CONFIG && window.PORTAL_CONFIG.office_email) || 'orders@nativeson.com';
        window.location.href =
          `mailto:${encodeURIComponent(officeEmail)}?subject=${encodeURIComponent(subject)}&body=${encodeURIComponent(body)}`;
      });

      orderDetail.scrollIntoView({ behavior: 'smooth', block: 'start' });
    }

    // ----- Toolbar -----
    searchInput.addEventListener('input', renderOrders);
    statusFilter.addEventListener('change', renderOrders);
    refreshBtn.addEventListener('click', loadOrders);

    // ----- CSV export -----
    exportBtn.addEventListener('click', () => {
      if (allOrders.length === 0) {
        alert('No orders to export.');
        return;
      }
      const headers = ['order_number', 'created_at', 'status', 'customer_name', 'customer_email', 'customer_phone', 'customer_company', 'item_count', 'subtotal', 'notes'];
      const csv = [
        headers.join(','),
        ...allOrders.map(o => headers.map(h => {
          let v = o[h];
          if (v == null) v = '';
          v = String(v).replace(/"/g, '""');
          return `"${v}"`;
        }).join(','))
      ].join('\n');
      const blob = new Blob([csv], { type: 'text/csv' });
      const url = URL.createObjectURL(blob);
      const a = document.createElement('a');
      a.href = url;
      a.download = `nativesons-orders-${new Date().toISOString().slice(0, 10)}.csv`;
      a.click();
      URL.revokeObjectURL(url);
    });
  </script>
</body>
</html>
