<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Office — Native Sons Order Entry</title>
  <meta name="robots" content="noindex,nofollow">

  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <link rel="stylesheet" href="styles.css">

  <style>
    /* Login — same as admin.html */
    .login-wrap {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      padding: 24px; background: var(--c-paper, #f7f4ec);
    }
    .login-card {
      background: white; border: 1px solid var(--c-line); border-radius: 12px;
      padding: 32px; max-width: 360px; width: 100%; box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .login-card h1 { margin: 0 0 8px; font-size: 22px; color: var(--c-sage, #2d4a2b); }
    .login-card p { color: var(--c-ink-soft, #4a5546); font-size: 14px; margin: 0 0 16px; }
    .login-card .form-field { margin-bottom: 14px; }
    .login-error { color: var(--c-clay, #d97757); font-size: 13px; margin-top: 12px; min-height: 18px; }
    .back-link { display: inline-block; margin-bottom: 12px; font-size: 13px; color: var(--c-muted); text-decoration: none; }
    .back-link:hover { color: var(--c-ink); text-decoration: underline; }

    /* Office header */
    .office-header {
      display: flex; align-items: center; justify-content: space-between;
      gap: 12px; padding: 16px 24px; background: var(--c-sage, #2d4a2b); color: white;
    }
    .office-header h1 { margin: 0; font-size: 18px; font-weight: 600; }
    .office-header .btn { background: rgba(255,255,255,.15); border-color: transparent; color: white; }
    .office-header .btn:hover { background: rgba(255,255,255,.25); }

    /* Layout */
    .office-body { display: grid; grid-template-columns: 380px 1fr 360px; gap: 0; min-height: calc(100vh - 56px); }
    @media (max-width: 1200px) { .office-body { grid-template-columns: 320px 1fr; } .office-cart-col { display: none; } .office-cart-col.is-open { display: block; position: fixed; right: 0; top: 56px; bottom: 0; width: 360px; background: white; z-index: 100; border-left: 1px solid var(--c-line); box-shadow: -4px 0 12px rgba(0,0,0,.08); } }
    @media (max-width: 700px)  { .office-body { grid-template-columns: 1fr; } .office-cust-col { display: none; } }

    .office-cust-col, .office-catalog-col, .office-cart-col {
      border-right: 1px solid var(--c-line); background: white; overflow-y: auto;
      max-height: calc(100vh - 56px);
    }
    .office-cust-col { padding: 16px; }
    .office-cart-col  { border-right: 0; padding: 16px; }
    .office-catalog-col { background: var(--c-paper, #f7f4ec); }

    .col-section-title {
      font-size: 11px; text-transform: uppercase; letter-spacing: 0.08em;
      color: var(--c-muted); font-weight: 700;
      margin: 0 0 10px;
    }

    /* Customer picker */
    .cust-picker-wrap { position: relative; margin-bottom: 12px; }
    .cust-picker-input {
      width: 100%; padding: 10px 36px 10px 14px; font-size: 15px;
      border: 1px solid var(--c-line); border-radius: 8px; background: white;
      font-family: inherit;
    }
    .cust-picker-input:focus { outline: none; border-color: var(--c-sage); box-shadow: 0 0 0 3px var(--c-sage-soft, #e3efe1); }
    .cust-picker-clear {
      position: absolute; right: 8px; top: 50%; transform: translateY(-50%);
      background: none; border: 0; font-size: 18px; color: var(--c-muted);
      cursor: pointer; padding: 4px 8px; display: none;
    }
    .cust-picker-clear:hover { color: var(--c-clay); }
    .cust-picker-results {
      position: absolute; top: 100%; left: 0; right: 0;
      background: white; border: 1px solid var(--c-line); border-radius: 8px;
      margin-top: 4px; max-height: 320px; overflow-y: auto;
      box-shadow: 0 6px 16px rgba(0,0,0,.1); z-index: 50;
      display: none;
    }
    .cust-picker-results.is-open { display: block; }
    .cust-result {
      padding: 8px 12px; border-bottom: 1px solid var(--c-line-soft, #efe9da);
      cursor: pointer; font-size: 13.5px;
    }
    .cust-result:last-child { border-bottom: 0; }
    .cust-result:hover, .cust-result.is-focused { background: var(--c-sage-soft, #e3efe1); }
    .cust-result-name { font-weight: 600; color: var(--c-ink); }
    .cust-result-meta { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
    .cust-result-meta span { margin-right: 8px; }
    .cust-result-empty { padding: 12px; text-align: center; color: var(--c-muted); font-style: italic; }

    /* Selected customer card */
    .selected-cust {
      background: var(--c-sage-soft, #e3efe1);
      border-radius: 8px; padding: 12px 14px; margin-bottom: 12px;
    }
    .selected-cust-name { font-weight: 600; font-size: 15px; color: var(--c-sage); }
    .selected-cust-meta { font-size: 12px; color: var(--c-ink-soft); margin-top: 4px; }
    .selected-cust-meta span { margin-right: 8px; }
    .selected-cust-actions { margin-top: 8px; display: flex; gap: 6px; flex-wrap: wrap; }
    .selected-cust-actions .btn { font-size: 12px; padding: 4px 10px; }

    /* Customer form (editable) */
    .cust-form .form-field { margin-bottom: 10px; }
    .cust-form label { display: block; font-size: 12px; color: var(--c-muted); margin-bottom: 4px; font-weight: 500; }
    .cust-form input {
      width: 100%; padding: 8px 10px; font-size: 14px;
      border: 1px solid var(--c-line); border-radius: 6px; background: white;
      font-family: inherit;
    }
    .cust-form input:focus { outline: none; border-color: var(--c-sage); box-shadow: 0 0 0 3px var(--c-sage-soft, #e3efe1); }

    /* Cart */
    .cart-empty { color: var(--c-muted); text-align: center; padding: 20px; font-size: 13px; font-style: italic; }
    .cart-line {
      background: white; border: 1px solid var(--c-line); border-radius: 8px;
      padding: 10px 12px; margin-bottom: 8px;
    }
    .cart-line.is-special { border-left: 3px solid var(--c-clay, #d97757); background: #fef9eb; }
    .cart-line-name { font-weight: 600; font-size: 14px; color: var(--c-ink); }
    .cart-line-meta { font-size: 12px; color: var(--c-muted); margin-top: 2px; }
    .cart-line-controls {
      display: grid; grid-template-columns: 70px 1fr 28px; gap: 6px;
      align-items: center; margin-top: 8px;
    }
    .cart-line-controls .qty-input {
      width: 100%; padding: 6px 8px; font-size: 14px; text-align: center;
      border: 1px solid var(--c-line); border-radius: 4px;
    }
    .cart-line-controls .retail-input {
      width: 100%; padding: 6px 8px; font-size: 13px;
      border: 1px solid var(--c-line); border-radius: 4px; text-align: right;
    }
    .cart-line-controls .remove-btn {
      background: none; border: 0; font-size: 18px; color: var(--c-muted);
      cursor: pointer; padding: 4px;
    }
    .cart-line-controls .remove-btn:hover { color: var(--c-clay); }
    .cart-line-flags { display: flex; gap: 4px; margin-top: 6px; }
    .cart-line-flag {
      background: none; border: 1px solid var(--c-line); border-radius: 4px;
      padding: 3px 8px; font-size: 11px; cursor: pointer; color: var(--c-muted);
    }
    .cart-line-flag.is-active { background: var(--c-clay); color: white; border-color: var(--c-clay); }

    .cart-totals {
      border-top: 2px solid var(--c-line); margin-top: 14px; padding-top: 12px;
    }
    .cart-total-row {
      display: flex; justify-content: space-between; font-size: 13px;
      padding: 3px 0;
    }
    .cart-total-row.is-bold { font-weight: 700; font-size: 15px; color: var(--c-sage); margin-top: 6px; }

    .cart-actions { display: flex; flex-direction: column; gap: 6px; margin-top: 14px; }
    .cart-actions .btn { width: 100%; }

    /* Default markup pill */
    .markup-pill {
      display: inline-flex; align-items: center; gap: 4px;
      padding: 3px 10px; background: var(--c-sage); color: white;
      border-radius: 12px; font-size: 12px; font-weight: 600;
    }

    /* Submit success state */
    .success-banner {
      background: var(--c-sage-soft, #e3efe1);
      border: 1px solid var(--c-sage); border-radius: 8px;
      padding: 14px 18px; margin: 0 0 14px;
      color: var(--c-sage); font-weight: 600;
    }
    .success-banner small { display: block; font-weight: 400; font-size: 12px; color: var(--c-ink-soft); margin-top: 4px; }
  </style>
</head>
<body>

  <!-- Login -->
  <div id="loginView" class="login-wrap">
    <form id="loginForm" class="login-card">
      <a href="index.html" class="back-link">← Public catalog</a>
      <h1>Office sign-in</h1>
      <p>Sign in to enter orders on behalf of customers.</p>
      <label class="form-field">
        <span>Password</span>
        <input type="password" id="passwordInput" required autocomplete="current-password" autofocus>
      </label>
      <button type="submit" class="btn btn-primary btn-block">Sign in</button>
      <div id="loginError" class="login-error"></div>
    </form>
  </div>

  <!-- Office workspace -->
  <div id="officeView" hidden>
    <div class="office-header">
      <h1>🌿 Native Sons — Order Entry</h1>
      <div>
        <a class="btn" href="admin.html">Admin</a>
        <button class="btn" id="logoutBtn">Sign out</button>
      </div>
    </div>

    <div class="office-body">
      <!-- LEFT: Customer picker + form -->
      <div class="office-cust-col">
        <div id="submitSuccess" hidden></div>
        <h2 class="col-section-title">Customer</h2>

        <div class="cust-picker-wrap">
          <input type="search" id="custPickerInput" class="cust-picker-input"
                 placeholder="Search name, code, city, email…" autocomplete="off">
          <button class="cust-picker-clear" id="custPickerClear" title="Clear">✕</button>
          <div class="cust-picker-results" id="custPickerResults"></div>
        </div>

        <div id="selectedCust" hidden>
          <div class="selected-cust">
            <div class="selected-cust-name" id="selCustName">—</div>
            <div class="selected-cust-meta" id="selCustMeta"></div>
            <div class="selected-cust-actions">
              <span class="markup-pill" id="selCustMarkup" hidden>+0% markup</span>
              <button type="button" class="btn btn-ghost" id="selCustClear">× Clear</button>
            </div>
          </div>
        </div>

        <h2 class="col-section-title" style="margin-top:14px;">Customer details</h2>
        <form id="custForm" class="cust-form" autocomplete="off">
          <div class="form-field">
            <label>Name <em>*</em></label>
            <input type="text" name="customer_name" required>
          </div>
          <div class="form-field">
            <label>Email <em>*</em></label>
            <input type="email" name="customer_email" required>
          </div>
          <div class="form-field">
            <label>Phone</label>
            <input type="tel" name="customer_phone">
          </div>
          <div class="form-field">
            <label>Company</label>
            <input type="text" name="customer_company">
          </div>
          <div class="form-field">
            <label>Notes (delivery, substitutions…)</label>
            <textarea name="notes" rows="3" style="width:100%; padding:8px 10px; border:1px solid var(--c-line); border-radius:6px; font-family:inherit;"></textarea>
          </div>
        </form>
      </div>

      <!-- CENTER: Plant catalog -->
      <div class="office-catalog-col">
        <div class="container" style="padding-top:16px;">
          <h2 class="col-section-title">Plants</h2>
          <div class="catalog-controls">
            <input type="search" id="plantSearchInput" placeholder="Search plants…" autocomplete="off">
            <div id="filterChips" class="filter-chips"></div>
          </div>
          <div id="plantGrid" class="plant-grid"></div>
        </div>
      </div>

      <!-- RIGHT: Cart -->
      <div class="office-cart-col">
        <h2 class="col-section-title">Order</h2>
        <div id="officeCart"></div>
        <div class="cart-totals" id="officeTotals" hidden></div>
        <div class="cart-actions" id="officeActions" hidden>
          <button type="button" class="btn btn-ghost" id="clearOrderBtn">Clear order</button>
          <button type="button" class="btn btn-primary" id="submitOrderBtn">Submit order</button>
        </div>
      </div>
    </div>
  </div>

  <!-- Plant detail modal (mirrors index.html) -->
  <div class="modal-overlay" id="modalOverlay" hidden></div>
  <div class="modal" id="plantModal" role="dialog" aria-modal="true" hidden>
    <header class="modal-header">
      <h3 id="modalTitle">Plant details</h3>
      <button class="icon-btn" id="closeModal" aria-label="Close">✕</button>
    </header>
    <div id="modalBody" class="modal-body"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js?v=2026-07-13a"></script>
  <script src="masteritem_data.js"></script>
  <script src="masteritem_full.js"></script>
  <script src="cart.js?v=2026-07-13a"></script>
  <script src="availability_data.js?v=2026-07-13"></script>
  <script src="office_customers.js?v=2026-07-13a"></script>

  <script>
  /* -------------------------------------------------------------------
   *  OFFICE.HTML — internal order-entry for the Native Sons office.
   *  Reuses:
   *    - window.Cart (cart.js)        — same cart abstraction as the
   *                                     public portal
   *    - window.SUPABASE_CONFIG        — Supabase anon key + URL
   *    - window.MASTER_ITEM_FULL       — for server-side lookup on submit
   *    - window.AVAILABILITY           — current week's plants
   *  Adds:
   *    - Customer picker (type-ahead search over the customers table)
   *    - Auto-apply default markup from customer's profile
   *    - Side-by-side layout: customer | catalog | order
   * ------------------------------------------------------------------- */

  const $ = (id) => document.getElementById(id);
  const loginView = $('loginView');
  const officeView = $('officeView');
  const loginForm = $('loginForm');
  const loginError = $('loginError');
  const passwordInput = $('passwordInput');
  const supabase = window.supabase.createClient(
    window.SUPABASE_CONFIG.url,
    window.SUPABASE_CONFIG.anonKey
  );

  /* ---------------- Login gate ---------------- */
  loginForm.addEventListener('submit', (e) => {
    e.preventDefault();
    const pw = passwordInput.value;
    if (window.ADMIN_CONFIG && pw === window.ADMIN_CONFIG.password) {
      sessionStorage.setItem('nativesons_admin', '1');
      loginError.textContent = '';
      showOffice();
    } else {
      loginError.textContent = 'Wrong password. Try again.';
      passwordInput.select();
    }
  });

  $('logoutBtn').addEventListener('click', () => {
    sessionStorage.removeItem('nativesons_admin');
    location.reload();
  });

  function showOffice() {
    loginView.hidden = true;
    officeView.hidden = false;
    init();
  }
  if (sessionStorage.getItem('nativesons_admin') === '1') showOffice();

  /* ---------------- Office state ---------------- */
  let allCustomers = [];
  let selectedCustomer = null;
  let currentQuery = '';
  let currentFilter = 'all';
  let pickerFocusedIdx = -1;
  let currentPickerResults = [];

  function esc(s) {
    return String(s == null ? '' : s)
      .replace(/&/g, '&amp;').replace(/</g, '&lt;').replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;').replace(/'/g, '&#39;');
  }
  const fmtPrice = (n) => '$' + Number(n || 0).toFixed(2);

  /* ---------------- Customer picker ---------------- */
  const custPickerInput   = $('custPickerInput');
  const custPickerResults = $('custPickerResults');
  const custPickerClear   = $('custPickerClear');
  const selectedCustCard  = $('selectedCust');
  const selCustName       = $('selCustName');
  const selCustMeta       = $('selCustMeta');
  const selCustMarkup     = $('selCustMarkup');
  const selCustClear      = $('selCustClear');
  const custForm          = $('custForm');

  function loadCustomers() {
    // Pulls from office_customers.js — a static, office-only dump of the
    // customers table. NEVER loaded by index.html (public portal), so the
    // PII it contains doesn't leak to the public web.
    if (window.OFFICE_CUSTOMERS && window.OFFICE_CUSTOMERS.length) {
      allCustomers = window.OFFICE_CUSTOMERS;
    }
  }

  custPickerInput.addEventListener('input', () => {
    currentQuery = custPickerInput.value.trim().toLowerCase();
    pickerFocusedIdx = -1;
    renderPicker();
    custPickerClear.style.display = custPickerInput.value ? 'block' : 'none';
  });

  custPickerInput.addEventListener('focus', renderPicker);
  custPickerInput.addEventListener('keydown', (e) => {
    if (!currentPickerResults.length) return;
    if (e.key === 'ArrowDown') { e.preventDefault(); pickerFocusedIdx = Math.min(pickerFocusedIdx + 1, currentPickerResults.length - 1); renderPicker(); }
    if (e.key === 'ArrowUp')   { e.preventDefault(); pickerFocusedIdx = Math.max(pickerFocusedIdx - 1, 0); renderPicker(); }
    if (e.key === 'Enter')     { e.preventDefault(); if (pickerFocusedIdx >= 0) pickCustomer(currentPickerResults[pickerFocusedIdx]); else if (currentPickerResults[0]) pickCustomer(currentPickerResults[0]); custPickerResults.classList.remove('is-open'); }
    if (e.key === 'Escape')    { custPickerResults.classList.remove('is-open'); }
  });

  document.addEventListener('click', (e) => {
    if (!e.target.closest('.cust-picker-wrap')) custPickerResults.classList.remove('is-open');
  });

  custPickerClear.addEventListener('click', () => {
    custPickerInput.value = '';
    currentQuery = '';
    custPickerClear.style.display = 'none';
    renderPicker();
    custPickerInput.focus();
  });

  selCustClear.addEventListener('click', () => clearSelectedCustomer());

  function renderPicker() {
    const q = currentQuery;
    if (q.length < 1) { custPickerResults.classList.remove('is-open'); return; }

    const matches = allCustomers.filter(c => (c.search_text || '').toLowerCase().includes(q)).slice(0, 12);
    currentPickerResults = matches;
    if (!matches.length) {
      custPickerResults.innerHTML = '<div class="cust-result-empty">No matches</div>';
    } else {
      custPickerResults.innerHTML = matches.map((c, i) => `
        <div class="cust-result${i === pickerFocusedIdx ? ' is-focused' : ''}" data-idx="${i}">
          <div class="cust-result-name">${esc(c.name || '(no name)')}</div>
          <div class="cust-result-meta">
            ${c.city ? `<span>${esc(c.city)}, ${esc(c.state || '')}</span>` : ''}
            ${c.customer_code ? `<span>Code: ${esc(c.customer_code)}</span>` : ''}
            ${c.type ? `<span>${esc(c.type)}</span>` : ''}
          </div>
        </div>
      `).join('');
      custPickerResults.querySelectorAll('.cust-result').forEach(row => {
        row.addEventListener('click', () => pickCustomer(matches[+row.dataset.idx]));
      });
    }
    custPickerResults.classList.add('is-open');
  }

  function pickCustomer(c) {
    selectedCustomer = c;
    selCustName.textContent = c.name;
    selCustMeta.innerHTML = [
      c.city && `<span>${esc(c.city)}, ${esc(c.state || '')}</span>`,
      c.customer_code && `<span>Code: ${esc(c.customer_code)}</span>`,
      c.type && `<span>${esc(c.type)}</span>`,
      c.terms && `<span>${esc(c.terms)}</span>`,
    ].filter(Boolean).join('');

    if (c.default_markup_pct != null && c.default_markup_pct > 0) {
      selCustMarkup.textContent = `+${(c.default_markup_pct * 100).toFixed(0)}% default markup`;
      selCustMarkup.hidden = false;
    } else {
      selCustMarkup.hidden = true;
    }

    selectedCustCard.hidden = false;

    // Fill form
    custForm.customer_name.value    = c.name || '';
    custForm.customer_email.value   = c.email || '';
    custForm.customer_phone.value   = c.phone || '';
    custForm.customer_company.value = c.ship_to_name && c.ship_to_name !== c.name ? c.ship_to_name : (c.name || '');

    // Close picker, clear search
    custPickerResults.classList.remove('is-open');
    custPickerInput.value = '';
    currentQuery = '';
    custPickerClear.style.display = 'none';

    // Apply default markup if we have one and cart isn't empty
    if (c.default_markup_pct && Cart.getCount() > 0) {
      const mult = 1 + c.default_markup_pct;
      const changed = Cart.applyDefaultMarkup(mult);
      if (changed) renderCart();
    }
  }

  function clearSelectedCustomer() {
    selectedCustomer = null;
    selectedCustCard.hidden = true;
    selCustMarkup.hidden = true;
    custForm.reset();
  }

  /* ---------------- Catalog rendering ---------------- */
  const plantGrid       = $('plantGrid');
  const plantSearchInput= $('plantSearchInput');
  const filterChips     = $('filterChips');

  function getSizes(p) {
    if (!p.sizes || !p.sizes.length) return [{ container: '', price: p.price || 0, order: '' }];
    return [...p.sizes].sort((a, b) => (a.order || 0) - (b.order || 0));
  }

  function plantMatchesQuery(p, q) {
    if (!q) return true;
    const hay = [
      p.botanical, p.common, p.section,
      p.origin, p.plant_type, p.flower_color, p.flower_time,
      p.foliage, p.special_uses,
      ...getSizes(p).map(s => s.container)
    ].filter(Boolean).join(' ').toLowerCase();
    return hay.includes(q);
  }

  function renderPlants() {
    const q = plantSearchInput.value.trim().toLowerCase();
    const all = window.AVAILABILITY && window.AVAILABILITY.plants || [];
    const filtered = all.filter(p => {
      if (currentFilter === 'bloom' && !p.bloom) return false;
      if (currentFilter === 'bud' && !p.bud) return false;
      if (currentFilter !== 'all' && currentFilter !== 'bloom' && currentFilter !== 'bud') {
        // Section filter
        const section = p.section || '';
        const secKey = section.toLowerCase().replace(/[^a-z]/g, '').slice(0, 6);
        if (secKey !== currentFilter) return false;
      }
      return plantMatchesQuery(p, q);
    });

    if (!filtered.length) {
      plantGrid.innerHTML = '<p style="color:var(--c-muted); padding:24px; text-align:center;">No plants match.</p>';
      return;
    }

    plantGrid.innerHTML = filtered.map(p => {
      const sizes = getSizes(p);
      const cheapest = sizes.reduce((m, s) => (s.price && (!m || s.price < m.price)) ? s : m, null);
      const heroName = p.botanical
        ? `<span class="plant-botanical">${esc(p.botanical)}</span>${p.common ? `<br><span class="plant-common">${esc(p.common)}</span>` : ''}`
        : esc(p.common);
      const badges = [
        p.bloom && '<span class="badge badge-bloom"><span class="dot"></span>In bloom</span>',
        p.bud && '<span class="badge badge-bud"><span class="dot"></span>Budding</span>',
      ].filter(Boolean).join('');
      const meta = [
        p.height && `<span class="meta-h"><span class="meta-label">H</span> ${esc(p.height)}</span>`,
        p.width && `<span><span class="meta-label">W</span> ${esc(p.width)}</span>`,
        p.flower_color && `<span>${esc(p.flower_color)}</span>`,
      ].filter(Boolean).join('');
      return `
        <article class="plant-card" data-plant-key="${esc(p.botanical || p.common)}">
          <header class="plant-card-header">
            <div class="plant-name">${heroName}</div>
            ${badges ? `<div class="badges plant-badges">${badges}</div>` : ''}
          </header>
          <div class="plant-meta">${meta}</div>
          <footer class="plant-card-footer">
            <div class="plant-size-price">
              ${sizes.length > 1 ? `${sizes.length} sizes` : esc(sizes[0].container || 'Default')}
              ${cheapest && cheapest.price ? `· from ${fmtPrice(cheapest.price)}` : ''}
            </div>
            <button class="btn btn-primary" data-action="open-detail" data-plant-key="${esc(p.botanical || p.common)}">Choose size</button>
          </footer>
        </article>
      `;
    }).join('');
  }

  plantSearchInput.addEventListener('input', renderPlants);
  filterChips.addEventListener('click', (e) => {
    const chip = e.target.closest('.chip');
    if (!chip) return;
    filterChips.querySelectorAll('.chip').forEach(c => c.classList.remove('active'));
    chip.classList.add('active');
    currentFilter = chip.dataset.filter;
    renderPlants();
  });
  plantGrid.addEventListener('click', (e) => {
    const btn = e.target.closest('[data-action="open-detail"]');
    if (!btn) return;
    openPlantDetail(btn.dataset.plantKey);
  });

  function renderFilterChips() {
    const all = window.AVAILABILITY && window.AVAILABILITY.plants || [];
    const sections = [...new Set(all.map(p => p.section).filter(Boolean))];
    const chips = [
      `<button class="chip active" data-filter="all">All <span class="count">${all.length}</span></button>`,
      `<button class="chip" data-filter="bloom">In bloom <span class="count">${all.filter(p => p.bloom).length}</span></button>`,
      `<button class="chip" data-filter="bud">Budding <span class="count">${all.filter(p => p.bud).length}</span></button>`,
      ...sections.map(s => {
        const n = all.filter(p => p.section === s).length;
        const key = s.toLowerCase().replace(/[^a-z]/g, '').slice(0, 6);
        return `<button class="chip" data-filter="${esc(key)}">${esc(s)} <span class="count">${n}</span></button>`;
      }),
    ];
    filterChips.innerHTML = chips.join('');
  }

  /* ---------------- Plant detail modal ---------------- */
  const modalOverlay = $('modalOverlay');
  const plantModal = $('plantModal');
  const modalTitle = $('modalTitle');
  const modalBody = $('modalBody');
  const closeModal = $('closeModal');

  function openPlantDetail(key) {
    const p = (window.AVAILABILITY.plants || []).find(x => (x.botanical || x.common) === key);
    if (!p) return;
    const sizes = getSizes(p);
    const badges = [
      p.bloom && '<span class="badge badge-bloom"><span class="dot"></span>In bloom</span>',
      p.bud && '<span class="badge badge-bud"><span class="dot"></span>Budding</span>',
    ].filter(Boolean).join('');

    modalTitle.textContent = p.common || p.botanical;
    const specRows = [];
    if (p.height) specRows.push(['Height', esc(p.height)]);
    if (p.width) specRows.push(['Width', esc(p.width)]);
    if (p.exposure) specRows.push(['Exposure', esc(p.exposure)]);
    if (p.plant_type) specRows.push(['Type', esc(p.plant_type)]);
    if (p.flower_color) specRows.push(['Flower color', esc(p.flower_color)]);
    if (p.flower_time) specRows.push(['Flower time', esc(p.flower_time)]);
    if (p.foliage) specRows.push(['Foliage', esc(p.foliage)]);
    if (p.origin) specRows.push(['Origin', esc(p.origin)]);

    const plantKey = p.botanical || p.common;
    modalBody.innerHTML = `
      <div class="detail-hero">
        <div class="detail-botanical">${esc(p.botanical || '')}</div>
        ${p.common && p.common !== p.botanical ? `<div class="detail-common">${esc(p.common)}</div>` : ''}
        ${badges ? `<div class="badges detail-badges">${badges}</div>` : ''}
      </div>
      ${specRows.length ? `<dl class="detail-specs">${specRows.map(([k, v]) => `<dt>${k}</dt><dd>${v}</dd>`).join('')}</dl>` : ''}
      <div class="detail-section-title">Choose size & qty</div>
      <div class="detail-sizes">${sizes.map((s, idx) => `
        <div class="detail-size-row" data-idx="${idx}">
          <div class="detail-size-info">
            <div class="detail-size-container">${esc(s.container || 'Default')}</div>
            <div class="detail-size-price">${s.price ? fmtPrice(s.price) : '—'}<span class="unit">/ea</span></div>
          </div>
          <div class="detail-size-controls">
            <input type="number" min="0" step="1" placeholder="0" class="qty-input" data-idx="${idx}">
            <button class="btn btn-primary" data-add-idx="${idx}">Add</button>
          </div>
        </div>
      `).join('')}</div>
    `;

    modalBody.querySelectorAll('[data-add-idx]').forEach(btn => {
      btn.addEventListener('click', () => {
        const idx = +btn.dataset.addIdx;
        const size = sizes[idx];
        const qty = parseInt(modalBody.querySelector(`input[data-idx="${idx}"]`).value, 10);
        if (!qty || qty < 1) {
          modalBody.querySelector(`input[data-idx="${idx}"]`).focus();
          return;
        }
        const name = p.botanical || p.common;
        const key = `${plantKey}__${size.container}`;
        Cart.add({
          key,
          plant_key: plantKey,
          name,
          size: size.container,
          price: size.price || 0,
          qty,
          retailMode: 'wholesale',
          retailPrice: size.price || 0,
          specialOrder: false,
        });
        closeModalFn();
        renderCart();
      });
    });

    modalOverlay.hidden = false;
    plantModal.hidden = false;
    document.body.style.overflow = 'hidden';
  }

  function closeModalFn() {
    modalOverlay.hidden = true;
    plantModal.hidden = true;
    document.body.style.overflow = '';
  }

  closeModal.addEventListener('click', closeModalFn);
  modalOverlay.addEventListener('click', closeModalFn);
  document.addEventListener('keydown', (e) => { if (e.key === 'Escape' && !plantModal.hidden) closeModalFn(); });

  /* ---------------- Cart rendering ---------------- */
  const officeCart = $('officeCart');
  const officeTotals = $('officeTotals');
  const officeActions = $('officeActions');

  function renderCart() {
    const items = Cart.getItems();
    if (!items.length) {
      officeCart.innerHTML = '<p class="cart-empty">Add plants from the catalog to start an order.</p>';
      officeTotals.hidden = true;
      officeActions.hidden = true;
      return;
    }

    officeCart.innerHTML = items.map(i => `
      <div class="cart-line${i.specialOrder ? ' is-special' : ''}" data-key="${esc(i.key)}">
        <div class="cart-line-name">${esc(i.name)}</div>
        <div class="cart-line-meta">
          ${esc(i.size || '—')} · ${fmtPrice(i.price)} ea · ${i.qty} units = <strong>${fmtPrice(i.price * i.qty)}</strong>
        </div>
        <div class="cart-line-controls">
          <input type="number" min="0" step="1" class="qty-input" value="${i.qty}" data-action="qty" data-key="${esc(i.key)}">
          <input type="text" class="retail-input" placeholder="Retail ea"
                 value="${i.retailMode === 'wholesale' ? '' : i.retailPrice ? Number(i.retailPrice).toFixed(2) : ''}"
                 data-action="retail" data-key="${esc(i.key)}">
          <button type="button" class="remove-btn" data-action="remove" data-key="${esc(i.key)}" title="Remove">×</button>
        </div>
        <div class="cart-line-flags">
          <button type="button" class="cart-line-flag${i.specialOrder ? ' is-active' : ''}"
                  data-action="special" data-key="${esc(i.key)}">★ Special order</button>
        </div>
      </div>
    `).join('');

    // Wire line controls
    officeCart.querySelectorAll('[data-action="qty"]').forEach(inp => {
      inp.addEventListener('input', () => {
        const q = parseInt(inp.value, 10) || 0;
        Cart.setQty(inp.dataset.key, q);
        renderCart();
      });
    });
    officeCart.querySelectorAll('[data-action="retail"]').forEach(inp => {
      inp.addEventListener('input', () => {
        const v = inp.value.trim();
        const key = inp.dataset.key;
        if (v === '' || v === '0') {
          Cart.setRetail(key, 'wholesale', 0, { allowZero: true });
        } else {
          const num = parseFloat(v);
          if (!isNaN(num)) Cart.setRetail(key, 'markup', num, { allowZero: true });
        }
        // Update totals only, not full cart re-render
        renderTotals();
      });
    });
    officeCart.querySelectorAll('[data-action="special"]').forEach(btn => {
      btn.addEventListener('click', () => {
        Cart.setSpecial(btn.dataset.key, !btn.classList.contains('is-active'));
        renderCart();
      });
    });
    officeCart.querySelectorAll('[data-action="remove"]').forEach(btn => {
      btn.addEventListener('click', () => { Cart.remove(btn.dataset.key); renderCart(); });
    });

    renderTotals();
    officeTotals.hidden = false;
    officeActions.hidden = false;
  }

  function renderTotals() {
    const subtotal = Cart.getSubtotal();
    const retail = Cart.getRetailSubtotal();
    const items = Cart.getItems();
    const markupTotal = Math.max(0, retail - subtotal);
    const count = Cart.getCount();

    officeTotals.innerHTML = `
      <div class="cart-total-row"><span>${items.length} lines, ${count} units</span></div>
      <div class="cart-total-row"><span>Wholesale subtotal</span><span>${fmtPrice(subtotal)}</span></div>
      <div class="cart-total-row"><span>Retail subtotal</span><span>${fmtPrice(retail)}</span></div>
      <div class="cart-total-row"><span>Markup total</span><span>${fmtPrice(markupTotal)}</span></div>
    `;
  }

  $('clearOrderBtn').addEventListener('click', () => {
    if (!confirm('Clear all items from this order?')) return;
    Cart.clear();
    renderCart();
  });

  Cart.onChange(renderCart);

  /* ---------------- Submit ---------------- */
  $('submitOrderBtn').addEventListener('click', async () => {
    const fd = new FormData(custForm);
    const formData = Object.fromEntries(fd.entries());
    if (!formData.customer_name || !formData.customer_email) {
      alert('Please enter customer name and email.');
      return;
    }
    const items = Cart.getItems();
    if (!items.length) { alert('Order is empty.'); return; }

    const submitBtn = $('submitOrderBtn');
    submitBtn.disabled = true;
    submitBtn.textContent = 'Submitting…';

    try {
      const subtotal = Cart.getSubtotal();
      const retail = Cart.getRetailSubtotal();
      const orderNumber = generateOrderNumber();

      const pItems = items.map(i => ({
        plant_key: i.key,
        plant_name: i.name,
        plant_size: i.size || null,
        unit_price: i.price,
        qty: i.qty,
        line_total: i.price * i.qty,
        retail_mode: i.retailMode || 'wholesale',
        retail_price: i.retailPrice,
        retail_line_total: (i.retailPrice || 0) * i.qty,
        special_order: !!i.specialOrder,
      }));

      const { data: orderId, error } = await supabase.rpc('submit_order', {
        p_order_number: orderNumber,
        p_customer_name: formData.customer_name.trim(),
        p_customer_email: formData.customer_email.trim().toLowerCase(),
        p_customer_phone: (formData.customer_phone || '').trim() || null,
        p_customer_company: (formData.customer_company || '').trim() || null,
        p_notes: (formData.notes || '').trim() || null,
        p_subtotal: subtotal,
        p_retail_subtotal: retail,
        p_item_count: items.length,
        p_items: pItems,
      });
      if (error) throw error;

      // Send emails (fire-and-forget)
      sendOrderEmails(orderNumber, orderId, items, formData);

      // Send to Slack
      supabase.functions.invoke('send-order-slack', {
        body: {
          record: {
            order_number: orderNumber,
            customer_name: formData.customer_name,
            customer_email: formData.customer_email,
            customer_phone: formData.customer_phone || null,
            customer_company: formData.customer_company || null,
            notes: formData.notes || null,
            status: 'new',
            subtotal,
            item_count: items.length,
            created_at: new Date().toISOString(),
            id: orderId,
          },
          items: items.map(i => ({
            plant_key: i.key,
            plant_name: i.name,
            plant_size: i.size,
            unit_price: i.price,
            qty: i.qty,
            line_total: i.price * i.qty,
            retail_unit_price: i.retailMode === 'markup' ? Number(i.retailPrice) : null,
            retail_price: i.retailPrice,
            retail_line_total: (i.retailPrice || 0) * i.qty,
            special_order: !!i.specialOrder,
          })),
        },
      }).catch(e => console.warn('Slack send failed:', e));

      // Success banner
      $('submitSuccess').hidden = false;
      $('submitSuccess').innerHTML = `
        <div class="success-banner">
          ✓ Order ${esc(orderNumber)} saved.
          <small>Email + Slack fired. <button type="button" class="btn btn-ghost" id="newOrderBtn" style="margin-left:8px; padding:2px 8px;">Start another</button></small>
        </div>
      `;
      $('newOrderBtn').addEventListener('click', () => location.reload());

      Cart.clear();
      renderCart();
    } catch (err) {
      console.error(err);
      alert('Submit failed: ' + (err.message || err));
    } finally {
      submitBtn.disabled = false;
      submitBtn.textContent = 'Submit order';
    }
  });

  async function sendOrderEmails(orderNumber, orderId, items, formData) {
    try {
      await supabase.functions.invoke('send-order-email', {
        body: {
          record: {
            order_number: orderNumber,
            customer_name: formData.customer_name,
            customer_email: formData.customer_email,
            customer_phone: formData.customer_phone || null,
            customer_company: formData.customer_company || null,
            notes: formData.notes || null,
            subtotal: Cart.getSubtotal(),
            retail_subtotal: Cart.getRetailSubtotal(),
            item_count: items.length,
            status: 'new',
            created_at: new Date().toISOString(),
            id: orderId,
          },
          items: items.map(i => ({
            plant_key: i.key, plant_name: i.name, plant_size: i.size,
            unit_price: i.price, qty: i.qty,
            line_total: i.price * i.qty,
            special_order: !!i.specialOrder,
          })),
        },
      });
    } catch (e) { console.warn('email send failed:', e); }
  }

  function generateOrderNumber() {
    const year = new Date().getFullYear();
    const seq = Math.floor(Math.random() * 9000) + 1000;
    return `NS-${year}-${seq}`;
  }

  /* ---------------- Init ---------------- */
  async function init() {
    renderFilterChips();
    renderPlants();
    renderCart();
    loadCustomers();  // synchronous — fills from window.OFFICE_CUSTOMERS
    // Re-render picker results if user is mid-search when customers land
    if (currentQuery) renderPicker();
  }

  </script>
</body>
</html>
