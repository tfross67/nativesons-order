<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta http-equiv="refresh" content="0; url=chat-search.html?staff=1">
  <title>Redirecting to Office…</title>
  <link rel="icon" type="image/jpeg" href="logo.jpg">
  <style>
    body {
      font-family: -apple-system, BlinkMacSystemFont, "Helvetica Neue", Helvetica, Arial, sans-serif;
      background: #f7f4ec;
      color: #2d4a2b;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      margin: 0;
      padding: 24px;
    }
    .redirect-card {
      background: #fff;
      border: 1px solid #d8d2c2;
      border-radius: 12px;
      padding: 32px;
      max-width: 380px;
      width: 100%;
      text-align: center;
      box-shadow: 0 4px 12px rgba(0,0,0,.04);
    }
    .redirect-card img {
      height: 56px;
      width: auto;
      margin: 0 auto 14px;
      display: block;
    }
    h1 { margin: 0 0 8px; font-size: 22px; font-weight: 400; }
    p { color: #6b6256; font-size: 14px; margin: 0 0 16px; line-height: 1.4; }
    a {
      display: inline-block;
      padding: 11px 18px;
      background: #2d4a2b;
      color: #fff;
      border-radius: 6px;
      text-decoration: none;
      font-weight: 600;
    }
    a:hover { background: #1e3a1d; }
  </style>
</head>
<body>
  <div class="redirect-card">
    <img src="logo.jpg" alt="Native Sons">
    <h1>Office is now in chat-search</h1>
    <p>The office order-entry form has been merged into the smart plant search. You'll be redirected to the staff sign-in.</p>
    <a href="chat-search.html?staff=1">Continue to office →</a>
  </div>
</body>
</html>
